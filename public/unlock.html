<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Login 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --rose:#ff2d78;--coral:#ff6b6b;--peach:#ffb347;--gold:#ffd700;
      --magenta:#e91e8c;--lavender:#c77dff;
      --script:'Dancing Script',cursive;--body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100dvh; overflow:hidden;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      font-family:var(--body); color:white; padding:20px;
      background: radial-gradient(ellipse at 0% 0%,   #ff2d78 0%, transparent 50%),
                  radial-gradient(ellipse at 100% 100%,#ffb347 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 60%,  #c77dff 0%, transparent 55%),
                  linear-gradient(160deg,#2d0018 0%,#3d0040 50%,#1a1030 100%);
    }
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .particle{
      position:absolute; border-radius:50%;
      animation:pFloat linear infinite;
    }
    @keyframes pFloat{
      0%{transform:translateY(0) scale(1);opacity:.6}
      100%{transform:translateY(-110dvh) scale(0.5);opacity:0}
    }

    .card{
      position:relative; z-index:10;
      width:min(420px,94vw);
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.3);
      backdrop-filter:blur(24px);
      border-radius:32px;
      padding:clamp(28px,6vw,44px) clamp(20px,5vw,36px);
      box-shadow:0 12px 48px rgba(255,45,120,.3), inset 0 1px 0 rgba(255,255,255,.35);
      text-align:center;
      animation:cardIn .9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn{
      from{opacity:0;transform:translateY(40px) scale(.93)}
      to  {opacity:1;transform:translateY(0) scale(1)}
    }

    .card-ribbon{
      display:flex;justify-content:center;align-items:center;gap:10px;
      margin-bottom:6px;
      font-size:11px;letter-spacing:4px;text-transform:uppercase;
      opacity:.6;
    }
    .ribbon-line{flex:1;height:1px;background:rgba(255,255,255,.35);}

    .cake-wrap{
      position:relative; width:clamp(64px,16vw,88px); height:clamp(58px,14vw,80px);
      margin:0 auto 12px; display:flex; align-items:center; justify-content:center;
      animation:cakeBounce 2s ease-in-out infinite;
    }
    .cake-half{
      position:absolute; font-size:clamp(64px,16vw,88px); line-height:1;
      filter:drop-shadow(0 0 20px rgba(255,215,0,.6));
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    }
    .cake-left{ clip-path:inset(0 50% 0 0); }
    .cake-right{ clip-path:inset(0 0 0 50%); }
    .cake-wrap.cut{ animation:none; }
    .cake-wrap.cut .cake-left{  transform:translate(-14px,2px) rotate(-7deg); }
    .cake-wrap.cut .cake-right{ transform:translate(14px,2px) rotate(7deg); }
    .knife-icon{
      position:absolute; font-size:clamp(28px,8vw,38px); opacity:0;
      transform:rotate(38deg); filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));
    }
    .cake-wrap.cut .knife-icon{ animation:knifeCut .7s ease forwards; }
    @keyframes knifeCut{
      0%  { left:-36px; top:-36px; opacity:0; }
      12% { opacity:1; }
      55% { left:46%;   top:42%;  }
      100%{ left:140%;  top:-40px; opacity:0; }
    }
    @keyframes cakeBounce{
      0%,100%{transform:translateY(0) scale(1)}
      45%{transform:translateY(-16px) scale(1.06)}
    }

    h1{
      font-family:var(--script); font-size:clamp(28px,8vw,42px); font-weight:700;
      background:linear-gradient(90deg,#ffd700,#ff6b6b,#c77dff,#ffd700);
      background-size:200%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite; line-height:1.2; margin-bottom:4px;
    }
    @keyframes shimmer{to{background-position:200% center}}

    .tagline{font-size:14px;opacity:.75;margin-bottom:24px;font-weight:600;letter-spacing:.5px;}

    #startBtn{
      display:block; width:100%; padding:16px;
      background:linear-gradient(135deg,#ff2d78,#e91e8c,#ffb347);
      border:none; border-radius:50px;
      color:white; font-family:var(--body); font-weight:800; font-size:17px;
      cursor:pointer; transition:transform .25s, box-shadow .25s;
      box-shadow:0 6px 28px rgba(255,45,120,.5);
      position:relative; overflow:hidden;
    }
    #startBtn::before{
      content:''; position:absolute; inset:0;
      background:linear-gradient(rgba(255,255,255,.2),transparent);
    }
    #startBtn:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(255,45,120,.6);}

    #loginBox{
      display:none; margin-top:20px;
      animation:fadeUp .6s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .input-wrap{
      position:relative; margin-bottom:14px;
    }
    .input-icon{
      position:absolute; left:16px; top:50%; transform:translateY(-50%);
      font-size:18px; pointer-events:none;
    }
    .input-wrap input{
      width:100%; padding:14px 16px 14px 46px;
      background:rgba(255,255,255,.14);
      border:1.5px solid rgba(255,255,255,.3);
      border-radius:16px;
      color:white; font-family:var(--body); font-size:16px;
      outline:none; transition:.3s;
    }
    .input-wrap input::placeholder{color:rgba(255,255,255,.5);}
    .input-wrap input:focus{
      border-color:var(--gold);
      background:rgba(255,255,255,.2);
      box-shadow:0 0 0 3px rgba(255,215,0,.2);
    }

    .unlock-btn{
      width:100%; padding:15px;
      background:linear-gradient(135deg,#ffd700,#ffb347,#ff6b6b);
      border:none; border-radius:50px;
      color:#1a0a14; font-family:var(--body); font-weight:800; font-size:16px;
      cursor:pointer; transition:.25s;
      box-shadow:0 6px 24px rgba(255,179,71,.45);
    }
    .unlock-btn:hover{transform:translateY(-2px) scale(1.02);}

    #msg{
      margin-top:14px; font-size:14px; font-weight:700;
      min-height:20px; letter-spacing:.5px;
      animation:blink .9s ease-in-out infinite;
    }
    #msg.error{color:#ffb347; text-shadow:0 0 10px rgba(255,179,71,.6);}
    #msg.success{color:#ffd700; text-shadow:0 0 12px rgba(255,215,0,.7);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

    .confetti-heart{
      position:fixed; pointer-events:none; z-index:50;
      animation:heartBurst ease-out forwards;
    }
    @keyframes heartBurst{
      0%{transform:translateY(0) scale(0);opacity:1}
      100%{transform:translateY(-80dvh) scale(1.2);opacity:0}
    }

    .shake{animation:shakeCard .4s ease;}
    @keyframes shakeCard{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

    .floaty{position:fixed;pointer-events:none;z-index:1;animation:floatUp linear forwards;}
    @keyframes floatUp{
      0%{transform:translateY(0) rotate(0);opacity:0}5%{opacity:1}
      95%{opacity:.8}100%{transform:translateY(-115dvh) rotate(720deg);opacity:0}
    }
  </style>
<style id="pt-style">
.pt-overlay{
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:radial-gradient(ellipse at 50% 40%, rgba(199,125,255,.28), transparent 60%),
             linear-gradient(160deg,rgba(26,0,20,.94),rgba(45,0,48,.94) 50%,rgba(26,10,34,.94));
  opacity:0; pointer-events:none; transition:opacity .25s ease;
  backdrop-filter:blur(8px);
}
.pt-overlay.show{ opacity:1; pointer-events:all; }
.pt-cake{ position:relative; width:80px; height:72px; display:flex; align-items:center; justify-content:center; }
.pt-cake-half{ position:absolute; font-size:56px; line-height:1; filter:drop-shadow(0 0 12px rgba(255,215,0,.55)); transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
.pt-cake-left{ clip-path:inset(0 50% 0 0); }
.pt-cake-right{ clip-path:inset(0 0 0 50%); }
.pt-overlay.show .pt-cake-left{ transform:translate(-9px,1px) rotate(-7deg); }
.pt-overlay.show .pt-cake-right{ transform:translate(9px,1px) rotate(7deg); }
.pt-knife{ position:absolute; font-size:26px; opacity:0; transform:rotate(38deg); }
.pt-overlay.show .pt-knife{ animation:ptKnife .6s ease forwards; }
@keyframes ptKnife{
  0%{ left:-30px; top:-30px; opacity:0; }
  15%{ opacity:1; }
  55%{ left:50%; top:46%; }
  100%{ left:120%; top:-30px; opacity:0; }
}
.pt-caption{ font-family:'Dancing Script',cursive; font-size:16px; font-weight:700; color:#ffd700; letter-spacing:.5px;
  text-shadow:0 0 10px rgba(255,45,120,.5); opacity:.95; }
</style>
</head>
<body>
  <div class="pt-overlay" id="ptOverlay">
    <div class="pt-cake">
      <div class="pt-cake-half pt-cake-left">🎂</div>
      <div class="pt-cake-half pt-cake-right">🎂</div>
      <div class="pt-knife">🔪</div>
    </div>
    <p class="pt-caption">Just a moment, love…</p>
  </div>

  <div class="particles" id="particles"></div>

  <audio id="bgMusic" loop>
    <source src="/music/Vikram Vedha Love Bgm.mp3" type="audio/mpeg"/>
  </audio>

  <div class="card" id="card">
    <div class="card-ribbon">
      <div class="ribbon-line"></div>
      <span>Special Surprise</span>
      <div class="ribbon-line"></div>
    </div>

    <div class="cake-wrap" id="cakeWrap">
      <div class="cake-half cake-left">🎂</div>
      <div class="cake-half cake-right">🎂</div>
      <div class="knife-icon" id="knifeIcon">🔪</div>
    </div>

    <h1>Birthday Surprise!</h1>
    <p class="tagline">Something special is waiting for you 💝</p>

    <button id="startBtn" onclick="showLogin()">
      🎀 Open Your Surprise
    </button>

    <div id="loginBox">
      <div class="input-wrap">
        <span class="input-icon">👸</span>
        <input id="name" placeholder="Enter your name (Princess)…" autocomplete="off"/>
      </div>
      <button class="unlock-btn" onclick="unlock()">✨ Unlock My Surprise ✨</button>
      <p id="msg"></p>
    </div>
  </div>

  <script>
    const music = document.getElementById('bgMusic');
    const pw=document.getElementById('particles');
    const pColors=['rgba(255,45,120,.4)','rgba(255,179,71,.35)','rgba(199,125,255,.4)','rgba(255,215,0,.3)'];
    for(let i=0;i<20;i++){
      const p=document.createElement('div'); p.className='particle';
      const sz=4+Math.random()*8;
      p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;
        top:${80+Math.random()*40}%;background:${pColors[i%4]};
        animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*6}s`;
      pw.appendChild(p);
    }

    const emojis=['🌸','💖','🎈','✨','🌺','💐','🎀','💝','🌷','🍫'];
    function spawn(){
      const e=document.createElement('div'); e.className='floaty';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText=`left:${Math.random()*100}vw;bottom:-30px;font-size:${16+Math.random()*18}px;
        animation-duration:${5+Math.random()*4}s;`;
      document.body.appendChild(e); setTimeout(()=>e.remove(),9000);
    }
    setInterval(spawn,400);

    function showLogin(){
      music.play().catch(()=>{});
      const cakeWrap = document.getElementById('cakeWrap');
      cakeWrap.classList.add('cut');
      burstSparkles();
      document.getElementById('startBtn').style.display='none';
      setTimeout(()=>{
        document.getElementById('loginBox').style.display='block';
      }, 550);
    }

    function burstSparkles(){
      const bits=['✨','🍰','💛','🎊'];
      const card=document.getElementById('card').getBoundingClientRect();
      const cx=card.left+card.width/2, cy=card.top+120;
      for(let i=0;i<14;i++){
        const s=document.createElement('div'); s.className='confetti-heart';
        s.textContent=bits[Math.floor(Math.random()*bits.length)];
        const dx=(Math.random()*160-80);
        s.style.cssText=`left:${cx+dx}px; top:${cy}px; font-size:${16+Math.random()*14}px;
          animation-duration:${.7+Math.random()*.6}s; animation-delay:${Math.random()*.2}s`;
        document.body.appendChild(s); setTimeout(()=>s.remove(),1500);
      }
    }

    async function unlock(){
      music.play().catch(()=>{});
      const name=document.getElementById('name').value.trim();
      const msgEl=document.getElementById('msg');
      if(!name){ msgEl.textContent='💌 Please enter your name (Princess)!'; msgEl.className='error'; return; }

      try{
        const res=await fetch('/api/birthday/unlock',{
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({name})
        });
        const data=await res.json();
        if(data.success){
          msgEl.textContent='🎉 Welcome, Princess!'; msgEl.className='success';
          burstHearts();
          setTimeout(()=>{ goNav('/surprice.html'); },900);
        } else {
          msgEl.textContent=data.message||'💔 Try again, my love~';
          msgEl.className='error';
          document.getElementById('card').classList.add('shake');
          setTimeout(()=>document.getElementById('card').classList.remove('shake'),400);
        }
      } catch(e){
        msgEl.textContent='💔 Something went wrong~'; msgEl.className='error';
      }
    }

    document.getElementById('name').addEventListener('keydown',ev=>{ if(ev.key==='Enter') unlock(); });

    function burstHearts(){
      const hearts=['💖','💝','💗','💕','✨','🌸'];
      for(let i=0;i<30;i++){
        const h=document.createElement('div'); h.className='confetti-heart';
        h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
        h.style.cssText=`left:${Math.random()*100}vw;bottom:20%;font-size:${20+Math.random()*24}px;
          animation-duration:${.8+Math.random()*.8}s;animation-delay:${Math.random()*.3}s`;
        document.body.appendChild(h); setTimeout(()=>h.remove(),1500);
      }
    }
  </script>
<script>
  function goNav(url){
    var ov = document.getElementById('ptOverlay');
    if(!ov){ window.location.href = url; return; }
    ov.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 620);
  }
</script>
</body>
</html>
