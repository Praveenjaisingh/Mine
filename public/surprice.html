<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Surprise 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --rose:#ff2d78;--coral:#ff6b6b;--peach:#ffb347;--gold:#ffd700;
      --magenta:#e91e8c;--lavender:#c77dff;
      --script:'Dancing Script',cursive;--body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100dvh; overflow-x:hidden; overflow-y:auto;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      font-family:var(--body); color:white; padding:20px;
      background: radial-gradient(ellipse at 30% 0%,  #ff2d78 0%, transparent 55%),
                  radial-gradient(ellipse at 70% 100%,#ffb347 0%, transparent 55%),
                  radial-gradient(ellipse at 50% 55%,  #7209b7 0%, transparent 60%),
                  linear-gradient(170deg,#200020 0%,#1a0030 50%,#0a1020 100%);
    }

    canvas#sparkles{position:fixed;inset:0;pointer-events:none;z-index:0;}

    .back-btn{
      position:fixed;top:16px;left:16px;z-index:200;
      padding:9px 18px; border:none; border-radius:50px;
      background:rgba(255,255,255,.18); backdrop-filter:blur(12px);
      color:white; font-family:var(--body); font-weight:700; font-size:13px;
      cursor:pointer; transition:.25s; border:1px solid rgba(255,255,255,.25);
    }
    .back-btn:hover{background:rgba(255,255,255,.28);}

    .card{
      position:relative;z-index:10;
      width:min(440px,95vw);
      background:rgba(255,255,255,.11);
      border:1px solid rgba(255,255,255,.28);
      backdrop-filter:blur(24px);
      border-radius:36px;
      padding:clamp(28px,6vw,44px) clamp(22px,5vw,40px);
      margin:30px 0;
      box-shadow:0 16px 56px rgba(255,45,120,.28), inset 0 1px 0 rgba(255,255,255,.3);
      text-align:center;
      animation:cardIn .9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:scale(.9) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}

    .cake{
      font-size:clamp(70px,18vw,96px); display:block; line-height:1;
      animation:cakePulse 2s ease-in-out infinite;
      filter:drop-shadow(0 0 24px rgba(255,215,0,.7));
      cursor:pointer; transition:.3s; margin-bottom:16px;
    }
    @keyframes cakePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08) translateY(-8px)}}
    .cake.cut{animation:cutAnim .8s ease both;}
    @keyframes cutAnim{0%{transform:scale(1)}40%{transform:scale(1.25) rotate(-6deg)}100%{transform:scale(.95)}}

    h1{
      font-family:var(--script); font-size:clamp(26px,7vw,40px); font-weight:700;
      background:linear-gradient(90deg,#ffd700 0%,#ff6b6b 40%,#c77dff 70%,#ffd700 100%);
      background-size:200%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 3.5s linear infinite; line-height:1.25; margin-bottom:6px;
    }
    @keyframes shimmer{to{background-position:200% center}}

    .sub{font-size:14px;opacity:.8;margin-bottom:24px;font-weight:600;}

    #celebrateBtn{
      display:block; width:100%; padding:17px;
      background:linear-gradient(135deg,#ff2d78,#e91e8c,#c77dff);
      border:none; border-radius:50px;
      color:white; font-family:var(--body); font-weight:800; font-size:17px;
      cursor:pointer; transition:.3s;
      box-shadow:0 8px 32px rgba(255,45,120,.5);
      position:relative; overflow:hidden;
      margin-bottom:8px;
    }
    #celebrateBtn::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.2),transparent);}
    #celebrateBtn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(255,45,120,.65);}

    .nav-tree{
      position:relative; width:100%; margin-top:14px; padding:16px 0 4px;
      display:none;
    }
    .tree-trunk{
      position:absolute; top:0; bottom:0; left:50%; width:3px;
      transform:translateX(-50%) scaleY(0); transform-origin:top; border-radius:3px; opacity:.75;
      background:linear-gradient(180deg,var(--gold),var(--rose),var(--lavender),var(--gold));
      box-shadow:0 0 10px rgba(255,215,0,.35);
      transition:transform .8s cubic-bezier(.2,.8,.2,1);
    }
    .tree-trunk.grow{ transform:translateX(-50%) scaleY(1); }
    .branch-row{ position:relative; min-height:58px; margin:8px 0; display:flex; align-items:center; }
    .branch-row.left  { justify-content:flex-start; }
    .branch-row.right { justify-content:flex-end; }

    .branch-node{
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,.16); border:2px solid var(--gold);
      display:flex; align-items:center; justify-content:center; font-size:15px;
      box-shadow:0 0 14px rgba(255,215,0,.5);
      z-index:3;
    }

    .branch-card{
      width:calc(50% - 36px);
      padding:11px 12px; border:none; border-radius:16px;
      font-family:var(--body); font-weight:800; font-size:13px;
      cursor:pointer; display:flex; align-items:center; gap:6px;
      position:relative; opacity:0; transition:transform .25s, box-shadow .25s;
    }
    .branch-row.left  .branch-card{ margin-right:auto; transform:translateX(-26px) scale(.5) rotate(-10deg); }
    .branch-row.right .branch-card{ margin-left:auto;  transform:translateX(26px)  scale(.5) rotate(10deg); }

    .branch-row.left  .branch-card::after{
      content:''; position:absolute; right:-20px; top:50%; width:20px; height:2px;
      background:var(--gold); transform:translateY(-50%); opacity:.85;
    }
    .branch-row.right .branch-card::after{
      content:''; position:absolute; left:-20px; top:50%; width:20px; height:2px;
      background:var(--gold); transform:translateY(-50%); opacity:.85;
    }

    .branch-card.pop{ animation:branchPop .65s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes branchPop{
      0%   { opacity:0; }
      100% { opacity:1; transform:translateX(0) scale(1) rotate(0deg); }
    }
    .branch-card.pop:hover{ transform:translateY(-3px) scale(1.04) !important; }

    .btn-letters  {background:linear-gradient(135deg,#ff6b6b,#ffb347);color:#1a0014;}
    .btn-memories {background:linear-gradient(135deg,#c77dff,#74c7ec);color:#1a0014;}
    .btn-reasons  {background:linear-gradient(135deg,#ff2d78,#c77dff);color:white;}
    .btn-timeline {background:linear-gradient(135deg,#ffb347,#ffd700);color:#1a0014;}
    .btn-quiz     {background:linear-gradient(135deg,#06d6a0,#ffd60a);color:#10002a;}
    .btn-wishes   {background:linear-gradient(135deg,#4cc9f0,#c77dff);color:white;}
    .btn-playlist {background:linear-gradient(135deg,#7209b7,#e91e8c);color:white;}
    .btn-countdown{background:linear-gradient(135deg,#ff7b00,#48cae4);color:#1a0a00;}
    .btn-flipgame {background:linear-gradient(135deg,#e91e8c,#ffd700);color:#1a0014;}

    .floaty{position:fixed;pointer-events:none;z-index:1;animation:floatUp linear forwards;}
    @keyframes floatUp{
      0%{transform:translateY(0) rotate(0);opacity:0}5%{opacity:1}
      95%{opacity:.8}100%{transform:translateY(-115dvh) rotate(720deg);opacity:0}
    }
  </style>
<style id="pt-style">
.pt-overlay{
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:radial-gradient(ellipse at 50% 40%, rgba(199,125,255,.28), transparent 60%),
             linear-gradient(160deg,rgba(26,0,20,.94),rgba(45,0,48,.94) 50%,rgba(26,10,34,.94));
  opacity:0; pointer-events:none; transition:opacity .25s ease;
  backdrop-filter:blur(8px);
}
.pt-overlay.show{ opacity:1; pointer-events:all; }
.pt-cake{ position:relative; width:80px; height:72px; display:flex; align-items:center; justify-content:center; }
.pt-cake-half{ position:absolute; font-size:56px; line-height:1; filter:drop-shadow(0 0 12px rgba(255,215,0,.55)); transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
.pt-cake-left{ clip-path:inset(0 50% 0 0); }
.pt-cake-right{ clip-path:inset(0 0 0 50%); }
.pt-overlay.show .pt-cake-left{ transform:translate(-9px,1px) rotate(-7deg); }
.pt-overlay.show .pt-cake-right{ transform:translate(9px,1px) rotate(7deg); }
.pt-knife{ position:absolute; font-size:26px; opacity:0; transform:rotate(38deg); }
.pt-overlay.show .pt-knife{ animation:ptKnife .6s ease forwards; }
@keyframes ptKnife{
  0%{ left:-30px; top:-30px; opacity:0; }
  15%{ opacity:1; }
  55%{ left:50%; top:46%; }
  100%{ left:120%; top:-30px; opacity:0; }
}
.pt-caption{ font-family:'Dancing Script',cursive; font-size:16px; font-weight:700; color:#ffd700; letter-spacing:.5px;
  text-shadow:0 0 10px rgba(255,45,120,.5); opacity:.95; }
</style>
</head>
<body>
  <div class="pt-overlay" id="ptOverlay">
    <div class="pt-cake">
      <div class="pt-cake-half pt-cake-left">🎂</div>
      <div class="pt-cake-half pt-cake-right">🎂</div>
      <div class="pt-knife">🔪</div>
    </div>
    <p class="pt-caption">Just a moment, love…</p>
  </div>

  <canvas id="sparkles"></canvas>

  <audio id="bgMusic" loop>
    <source src="/music/Anbe En Anbe Bgm.mp3" type="audio/mpeg"/>
  </audio>

  <button class="back-btn" onclick="goBack()">← Back</button>

  <div class="card">
    <span class="cake" id="cake" onclick="celebrate()">🎂</span>
    <h1>Happy Birthday, Princess!</h1>
    <p class="sub">Tap the cake or choose what you'd like to see 💖</p>

    <button id="celebrateBtn" onclick="celebrate()">🎊 Celebrate!</button>

    <div class="nav-tree" id="navGrid">
      <div class="tree-trunk"></div>

      <div class="branch-row left">
        <button class="branch-card btn-letters" onclick="go('letters.html')">💌 Letters</button>
        <div class="branch-node">💌</div>
      </div>
      <div class="branch-row right">
        <div class="branch-node">📸</div>
        <button class="branch-card btn-memories" onclick="go('memories.html')">📸 Memories</button>
      </div>
      <div class="branch-row left">
        <button class="branch-card btn-reasons" onclick="go('reasons.html')">❤️ Reasons</button>
        <div class="branch-node">❤️</div>
      </div>
      <div class="branch-row right">
        <div class="branch-node">✨</div>
        <button class="branch-card btn-timeline" onclick="go('timeline.html')">✨ Journey</button>
      </div>
      <div class="branch-row left">
        <button class="branch-card btn-quiz" onclick="go('quiz.html')">🧠 Mom Quiz</button>
        <div class="branch-node">🧠</div>
      </div>
      <div class="branch-row right">
        <div class="branch-node">💝</div>
        <button class="branch-card btn-wishes" onclick="go('wishes.html')">💝 Wishes</button>
      </div>
      <div class="branch-row left">
        <button class="branch-card btn-playlist" onclick="go('playlist.html')">🎵 Playlist</button>
        <div class="branch-node">🎵</div>
      </div>
      <div class="branch-row right">
        <div class="branch-node">⏳</div>
        <button class="branch-card btn-countdown" onclick="go('countdown.html')">⏳ Countdown</button>
      </div>
      <div class="branch-row left">
        <button class="branch-card btn-flipgame" onclick="go('flipgame.html')">🎴 Flip & Win</button>
        <div class="branch-node">🎴</div>
      </div>
    </div>
  </div>

  <script>
    const music=document.getElementById('bgMusic');
    music.play().catch(()=>{});

    const canvas=document.getElementById('sparkles');
    const ctx=canvas.getContext('2d');
    let W,H,particles=[];
    function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
    resize(); window.addEventListener('resize',resize);

    function mkParticle(){
      const colors=['#ffd700','#ff6b6b','#c77dff','#74c7ec','#ff2d78','#ffb347'];
      return{
        x:Math.random()*W, y:Math.random()*H,
        r:.5+Math.random()*2, vx:(Math.random()-.5)*.4,
        vy:-.2-Math.random()*.4, life:1, decay:.004+Math.random()*.006,
        color:colors[Math.floor(Math.random()*colors.length)]
      };
    }
    for(let i=0;i<80;i++) particles.push(mkParticle());

    function drawCanvas(){
      ctx.clearRect(0,0,W,H);
      particles.forEach((p,i)=>{
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=p.color; ctx.globalAlpha=p.life*.5; ctx.fill();
        p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
        if(p.life<=0) particles[i]=mkParticle();
      });
      ctx.globalAlpha=1; requestAnimationFrame(drawCanvas);
    }
    drawCanvas();

    const emojis=['🌸','💖','🎈','✨','🌺','💐','🎀','💝','🌷'];
    function spawn(){
      const e=document.createElement('div'); e.className='floaty';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText=`left:${Math.random()*100}vw;bottom:-30px;font-size:${16+Math.random()*20}px;
        animation-duration:${5+Math.random()*4}s;`;
      document.body.appendChild(e); setTimeout(()=>e.remove(),9000);
    }
    setInterval(spawn,450);

    const CELEBRATED_KEY='bdayCelebrated';
    let celebrated=false;

    function showFinalState(){
      celebrated=true;
      const cake=document.getElementById('cake');
      cake.style.animation='none';
      cake.textContent='🍰'; cake.classList.add('cut');
      document.getElementById('celebrateBtn').style.display='none';
      const navGrid = document.getElementById('navGrid');
      navGrid.style.display='block';
      navGrid.querySelector('.tree-trunk').classList.add('grow');
      navGrid.querySelectorAll('.branch-card').forEach(card=>card.classList.add('pop'));
      setInterval(spawn,250);
    }

    function celebrate(){
      if(celebrated) return; celebrated=true;
      sessionStorage.setItem(CELEBRATED_KEY,'1');
      music.play().catch(()=>{});
      const cake=document.getElementById('cake');
      cake.textContent='🍰'; cake.classList.add('cut');
      document.getElementById('celebrateBtn').style.display='none';
      burst();
      setTimeout(()=>{
        const navGrid = document.getElementById('navGrid');
        navGrid.style.display='block';
        navGrid.querySelector('.tree-trunk').classList.add('grow');
        const cards = navGrid.querySelectorAll('.branch-card');
        cards.forEach((card, i) => {
          setTimeout(() => {
            card.classList.add('pop');
            popFizz(card);
          }, 250 + i * 130);
        });
        setInterval(spawn,250);
      },1000);
    }


    if(sessionStorage.getItem(CELEBRATED_KEY)==='1'){
      showFinalState();
    }

    function popFizz(btn){
      const rect = btn.getBoundingClientRect();
      const items=['✨','💫','⭐'];
      for(let i=0;i<5;i++){
        const e=document.createElement('div'); e.className='floaty';
        e.textContent=items[Math.floor(Math.random()*items.length)];
        e.style.cssText=`left:${rect.left+rect.width/2+(Math.random()*40-20)}px;
          top:${rect.top+rect.height/2}px;bottom:auto;font-size:${10+Math.random()*8}px;
          animation-duration:${.8+Math.random()*.6}s;`;
        document.body.appendChild(e); setTimeout(()=>e.remove(),1500);
      }
    }

    function burst(){
      const items=['🎉','💖','✨','🌸','💝','🎀','🌺','🎊'];
      for(let i=0;i<80;i++){
        setTimeout(()=>{
          const e=document.createElement('div'); e.className='floaty';
          e.textContent=items[Math.floor(Math.random()*items.length)];
          e.style.cssText=`left:${Math.random()*100}vw;bottom:-30px;font-size:${20+Math.random()*24}px;
            animation-duration:${1.5+Math.random()*2}s;`;
          document.body.appendChild(e); setTimeout(()=>e.remove(),4000);
        }, i*20);
      }
    }

    function go(href){ goNav('/'+href); }
    function goBack(){ goNav('/loader.html'); }
  </script>
<script>
  function goNav(url){
    var ov = document.getElementById('ptOverlay');
    if(!ov){ window.location.href = url; return; }
    ov.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 620);
  }
</script>
</body>
</html>
