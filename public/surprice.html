<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surprise 🎉</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@500;700&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow: hidden;
      padding: 15px;

      background: linear-gradient(-45deg, #ff4d6d, #8ecae6, #ffb703, #7209b7);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
    }

    @keyframes bg {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(15px);
      padding: 30px 20px;
      border-radius: 25px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .cake {
      font-size: clamp(60px, 15vw, 80px);
      animation: bounce 1.5s infinite;
      transition: 0.5s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    .cake.cut {
      animation: cutCake 1s forwards;
    }

    @keyframes cutCake {
      0% {
        transform: scale(1) rotate(0);
      }

      50% {
        transform: scale(1.2) rotate(-5deg);
      }

      100% {
        transform: scale(0.95) translateY(10px);
      }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 6vw, 30px);
      text-align: center;
      margin-top: 12px;

      color: #ffffff;
      text-shadow:
        0 0 8px rgba(255, 77, 109, 0.8),
        0 0 15px rgba(255, 221, 87, 0.6),
        0 0 25px rgba(255, 255, 255, 0.3);

      letter-spacing: 0.5px;
      animation: glowTitle 2.5s ease-in-out infinite alternate;
    }

    @keyframes glowTitle {
      from {
        transform: scale(1);
        text-shadow:
          0 0 6px rgba(255, 255, 255, 0.4),
          0 0 12px rgba(255, 77, 109, 0.6);
      }

      to {
        transform: scale(1.02);
        text-shadow:
          0 0 10px rgba(255, 221, 87, 0.8),
          0 0 20px rgba(255, 77, 109, 0.8);
      }
    }

    p {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      font-size: clamp(14px, 4vw, 16px);
      margin-top: 10px;

      color: #fff;
      opacity: 0.95;

      text-shadow:
        0 0 8px rgba(0, 0, 0, 0.4),
        0 0 12px rgba(255, 255, 255, 0.2);

      letter-spacing: 0.4px;
    }

    button {
      display: block;
      margin: 10px auto;
      width: 100%;
      max-width: 260px;
      padding: 12px;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #celebrateBtn {
      background: linear-gradient(45deg, #ff4d6d, #ffdd57);
      color: black;
    }

    #lettersBtn,
    #memoriesBtn {
      background: white;
      color: black;
    }

    .emoji {
      position: absolute;
      font-size: 22px;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    .backBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 5px 9px;
      font-size: 12px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
      transition: 0.25s ease;
    }

    .backBtn::before {
      content: "←";
      font-size: 12px;
    }

    .backBtn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.28);
    }

    @media (max-width: 480px) {
      .card {
        padding: 25px 15px;
      }

      h1 {
        font-size: 20px;
      }

      p {
        font-size: 13px;
        padding: 0 10px;
      }
    }
  </style>
</head>

<body>

  <audio id="bgMusic" loop>
    <source src="/music/Anbe En Anbe Bgm.mp3" type="audio/mpeg">
  </audio>

  <button class="backBtn" onclick="goBack()">Back</button>

  <div class="card">

    <div class="cake">🎂</div>

    <h1>🎉 Happy Birthday Princess ❤️</h1>
    <p>Choose what you want to see</p>

    <button id="celebrateBtn" onclick="celebrate()">🎊 Celebrate</button>
    <button id="lettersBtn" onclick="goLetters()" style="display:none;">💌 Letters</button>
    <button id="memoriesBtn" onclick="goMemories()" style="display:none;">📸 Memories</button>

  </div>

  <script>
    function goLetters() {
      window.location.href = "/letters.html";
    }

    function goMemories() {
      window.location.href = "/memories.html";
    }

    const music = document.getElementById("bgMusic");

    function startMusic() {
      music.play().catch(() => { });
    }

    startMusic();

    let continuousInterval = null;

    function celebrate() {
      const cake = document.querySelector(".cake");
      const lettersBtn = document.getElementById("lettersBtn");
      const memoriesBtn = document.getElementById("memoriesBtn");
      const celebrateBtn = document.getElementById("celebrateBtn");

      cake.innerHTML = "🍰";
      cake.classList.add("cut");

      celebrateBtn.style.display = "none";

      setTimeout(() => {
        lettersBtn.style.display = "block";
        memoriesBtn.style.display = "block";
      }, 1200);

      burstFlowers();

      setTimeout(() => {
        if (!continuousInterval) {
          continuousInterval = setInterval(createFlower, 300);
        }
      }, 1200);
    }

    function burstFlowers() {
      for (let i = 0; i < 120; i++) {
        setTimeout(() => createFlower(true), i * 10);
      }
    }

    function goBack() {
      window.location.href = "/loader.html";
    }

    function createFlower(isBurst = false) {
      const e = document.createElement("div");
      e.className = "emoji";

      const emojis = ["🎉", "💖", "🎂", "✨", "🌸", "🕊️", "🌺", "🍫"];
      e.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

      e.style.left = Math.random() * 100 + "vw";
      e.style.top = "-20px";

      e.style.fontSize = isBurst
        ? (22 + Math.random() * 22) + "px"
        : (16 + Math.random() * 16) + "px";

      e.style.animationDuration = isBurst
        ? (2 + Math.random() * 2) + "s"
        : (3 + Math.random() * 3) + "s";

      document.body.appendChild(e);

      setTimeout(() => e.remove(), 6000);
    }
  </script>

</body>

</html>
