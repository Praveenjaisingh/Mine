<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reasons ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --rose:#ff2d78;--coral:#ff6b6b;--peach:#ffb347;--gold:#ffd700;
      --magenta:#e91e8c;--lavender:#c77dff;
      --script:'Dancing Script',cursive;--body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100dvh; overflow:hidden;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      font-family:var(--body); color:white; padding:20px;
      background: radial-gradient(ellipse at 0% 30%,   #ff2d78 0%, transparent 55%),
                  radial-gradient(ellipse at 100% 70%,  #c77dff 0%, transparent 55%),
                  radial-gradient(ellipse at 50% 0%,    #ffb347 0%, transparent 40%),
                  linear-gradient(170deg,#2d001a 0%,#1a0030 50%,#0a100a 100%);
    }

    .back-btn{
      position:fixed;top:16px;left:16px;z-index:200;
      padding:9px 18px; border:1px solid rgba(255,255,255,.3); border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;cursor:pointer;transition:.25s;
    }
    .back-btn:hover{background:rgba(255,255,255,.3);}

    .lang-btn{
      position:fixed;top:16px;right:16px;z-index:200;
      padding:9px 18px; border:1px solid rgba(255,255,255,.3); border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;cursor:pointer;transition:.25s;
    }
    .lang-btn:hover{background:rgba(255,255,255,.3);}

    .music-btn{
      position:fixed;bottom:20px;right:20px;z-index:200;
      width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.3);
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-size:22px;cursor:pointer;transition:.25s;
    }
    .music-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.08);}

    .counter{
      font-family:var(--body);font-size:12px;letter-spacing:3px;text-transform:uppercase;
      opacity:.6;margin-bottom:6px;
      animation:fadeUp .5s ease both;
    }

    h1{
      font-family:var(--script);font-size:clamp(28px,8vw,44px);font-weight:700;
      background:linear-gradient(90deg,#ffd700,#ff6b6b,#c77dff,#ffd700);
      background-size:200%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite;
      line-height:1.2;text-align:center;margin-bottom:20px;
    }
    @keyframes shimmer{to{background-position:200% center}}
    .reason-card {
      width: min(500px, 94vw);
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.3);
      backdrop-filter: blur(20px) saturate(180%); /* this blurs floaties behind the card */
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 28px;
      padding: clamp(24px,5vw,36px);
      box-shadow: 0 12px 48px rgba(255,45,120,.28), inset 0 1px 0 rgba(255,255,255,.3);
      text-align: center;
      position: relative;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .reason-card::before{
      content:''; position:absolute;inset:0;
      background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,.12),transparent 60%);
      pointer-events:none;
    }

    .reason-number{
      font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.5;font-weight:700;
    }
    .reason-text{
      font-size:clamp(18px,5vw,24px);font-weight:700;line-height:1.6;
      text-shadow:0 2px 16px rgba(255,45,120,.3);
      transition:opacity .3s;
    }
    .reason-text.fade{opacity:0;}

    .show-btn{
      margin-top:18px; padding:15px 36px;
      background:linear-gradient(135deg,#ff2d78,#e91e8c,#ffb347);
      border:none;border-radius:50px;
      color:white;font-family:var(--body);font-weight:800;font-size:16px;
      cursor:pointer;transition:.25s;
      box-shadow:0 6px 28px rgba(255,45,120,.45);
      position:relative;overflow:hidden;
    }
    .show-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.2),transparent);}
    .show-btn:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(255,45,120,.6);}

    .dots{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap;justify-content:center;}
    .dot{
      width:8px;height:8px;border-radius:50%;
      background:rgba(255,255,255,.25);transition:.4s;
    }
    .dot.active{background:var(--gold);box-shadow:0 0 8px var(--gold);}
    .heart{position:fixed;pointer-events:none;z-index:1;animation:heartFloat linear forwards;}
    @keyframes heartFloat{
      0%{transform:translateY(0) rotate(0);opacity:0}5%{opacity:1}
      95%{opacity:.8}100%{transform:translateY(-115dvh) rotate(360deg);opacity:0}
    }
    .floaty{position:fixed;pointer-events:none;z-index:-2;animation:floatUp linear forwards;}
    @keyframes floatUp{
      0%{transform:translateY(0) rotate(0);opacity:0}5%{opacity:1}
      95%{opacity:.8}100%{transform:translateY(-115dvh) rotate(720deg);opacity:0}
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-wrap{animation:fadeUp .7s ease both;}
  </style>
<style id="pt-style">
.pt-overlay{
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:radial-gradient(ellipse at 50% 40%, rgba(199,125,255,.28), transparent 60%),
             linear-gradient(160deg,rgba(26,0,20,.94),rgba(45,0,48,.94) 50%,rgba(26,10,34,.94));
  opacity:0; pointer-events:none; transition:opacity .25s ease;
  backdrop-filter:blur(8px);
}
.pt-overlay.show{ opacity:1; pointer-events:all; }
.pt-cake{ position:relative; width:80px; height:72px; display:flex; align-items:center; justify-content:center; }
.pt-cake-half{ position:absolute; font-size:56px; line-height:1; filter:drop-shadow(0 0 12px rgba(255,215,0,.55)); transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
.pt-cake-left{ clip-path:inset(0 50% 0 0); }
.pt-cake-right{ clip-path:inset(0 0 0 50%); }
.pt-overlay.show .pt-cake-left{ transform:translate(-9px,1px) rotate(-7deg); }
.pt-overlay.show .pt-cake-right{ transform:translate(9px,1px) rotate(7deg); }
.pt-knife{ position:absolute; font-size:26px; opacity:0; transform:rotate(38deg); }
.pt-overlay.show .pt-knife{ animation:ptKnife .6s ease forwards; }
@keyframes ptKnife{
  0%{ left:-30px; top:-30px; opacity:0; }
  15%{ opacity:1; }
  55%{ left:50%; top:46%; }
  100%{ left:120%; top:-30px; opacity:0; }
}
.pt-caption{ font-family:'Dancing Script',cursive; font-size:16px; font-weight:700; color:#ffd700; letter-spacing:.5px;
  text-shadow:0 0 10px rgba(255,45,120,.5); opacity:.95; }
</style>
</head>
<body>
  <div class="pt-overlay" id="ptOverlay">
    <div class="pt-cake">
      <div class="pt-cake-half pt-cake-left">🎂</div>
      <div class="pt-cake-half pt-cake-right">🎂</div>
      <div class="pt-knife">🔪</div>
    </div>
    <p class="pt-caption">Just a moment, love…</p>
  </div>

  <audio id="bgMusic" loop>
    <source src="/music/Mariyan Love BGM.mp3" type="audio/mpeg"/>
  </audio>

  <button class="back-btn" onclick="goBack()">← Back</button>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 தமிழ்</button>
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🔊</button>

  <div class="card-wrap">
    <div class="counter" id="counter">Reason 0 of 10</div>
    <h1>Why You're So Special ❤️</h1>

    <div class="reason-card">
      <div class="reason-number" id="reasonNum">—</div>
      <div class="reason-text" id="reasonText">Tap the button to discover a reason 💖</div>
    </div>

    <div class="dots" id="dots"></div>
    <button class="show-btn" onclick="showReason()">💖 Show a Reason</button>
  </div>

  <script>
    const music=document.getElementById('bgMusic');
    music.play().catch(()=>{});

    let lang='en', used=[], idx=0;

    const reasons=[
      {en:"You are the strongest woman in my life ❤️",        ta:"என் வாழ்க்கையில் மிக வலிமையான பெண் நீங்கள் ❤️"},
      {en:"Your smile gives peace to everyone 😊",            ta:"உங்கள் சிரிப்பு அனைவருக்கும் அமைதியை தருகிறது 😊"},
      {en:"You always care even when you're tired 💖",        ta:"சோர்வாக இருந்தாலும் நீங்கள் எப்போதும் அக்கறை கொள்கிறீர்கள் 💖"},
      {en:"Your love is unconditional and endless 🌸",        ta:"உங்கள் அன்பு நிபந்தனையற்றது, எல்லையற்றது 🌸"},
      {en:"You make every house feel like home 🏡",           ta:"ஒவ்வொரு வீட்டையும் நீங்கள் இல்லமாக மாற்றுகிறீர்கள் 🏡"},
      {en:"Your hugs heal everything 🤗",                     ta:"உங்கள் அணைப்பு எல்லா வலியையும் குணப்படுத்துகிறது 🤗"},
      {en:"You are my very first best friend ❤️",             ta:"என் முதல் சிறந்த நண்பர் நீங்கள் ❤️"},
      {en:"You sacrificed so much for our happiness 💫",      ta:"மகிழ்ச்சிக்காக நீங்கள் பல தியாகங்கள் செய்துள்ளீர்கள் 💫"},
      {en:"You are my superhero 🦸‍♀️",                          ta:"நீங்கள் என் சூப்பர் ஹீரோ 🦸‍♀️"},
      {en:"Life feels beautiful because of you 💕",           ta:"உங்களால் வாழ்க்கை அழகாக இருக்கிறது 💕"},
    ];

    const dotsEl=document.getElementById('dots');
    reasons.forEach((_,i)=>{ const d=document.createElement('div');d.className='dot';d.id='dot-'+i;dotsEl.appendChild(d); });

    function showReason(){
      if(used.length===reasons.length) used=[];
      let pick; do{ pick=Math.floor(Math.random()*reasons.length); }while(used.includes(pick));
      used.push(pick); idx=pick;

      const textEl=document.getElementById('reasonText');
      textEl.classList.add('fade');
      setTimeout(()=>{
        textEl.textContent=reasons[pick][lang];
        document.getElementById('reasonNum').textContent=`Reason #${pick+1}`;
        document.getElementById('counter').textContent=`Shown ${used.length} of ${reasons.length}`;
        textEl.classList.remove('fade');
        document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
        document.getElementById('dot-'+pick).classList.add('active');
        burstHearts();
      },300);
    }

    function burstHearts(){
      const h=['💖','💝','💗','🌸','✨','🌷'];
      for(let i=0;i<20;i++){
        setTimeout(()=>{
          const e=document.createElement('div');e.className='heart';
          e.textContent=h[Math.floor(Math.random()*h.length)];
          e.style.cssText=`left:${Math.random()*100}vw;bottom:-20px;font-size:${18+Math.random()*20}px;
            animation-duration:${3+Math.random()*3}s;`;
          document.body.appendChild(e);setTimeout(()=>e.remove(),7000);
        },i*60);
      }
    }

    const emojis=['🌸','💖','✨','🌺','🎀','💝','🌷'];
    function spawnFloat(){
      const e=document.createElement('div');e.className='floaty';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText=`left:${Math.random()*100}vw;bottom:-20px;font-size:${14+Math.random()*16}px;
        animation-duration:${5+Math.random()*4}s;`;
      document.body.appendChild(e);setTimeout(()=>e.remove(),9000);
    }
    setInterval(spawnFloat,500);

    function toggleLang(){
      lang=lang==='en'?'ta':'en';
      document.getElementById('langBtn').textContent=lang==='en'?'🌐 தமிழ்':'🌐 English';
      if(used.length>0){
        const textEl=document.getElementById('reasonText');
        textEl.classList.add('fade');
        setTimeout(()=>{ textEl.textContent=reasons[idx][lang]; textEl.classList.remove('fade'); },300);
      }
    }
    function toggleMusic(){ music.paused?music.play():music.pause(); document.getElementById('musicBtn').textContent=music.paused?'🔇':'🔊'; }
    function goBack(){ goNav('/surprice.html'); }
  </script>
<script>
  function goNav(url){
    var ov = document.getElementById('ptOverlay');
    if(!ov){ window.location.href = url; return; }
    ov.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 620);
  }
</script>
</body>
</html>
