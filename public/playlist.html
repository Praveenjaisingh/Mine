<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Playlist 🎶</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --rose:#ff2d78;--coral:#ff6b6b;--peach:#ffb347;--gold:#ffd700;
      --magenta:#e91e8c;--lavender:#c77dff;--violet:#7209b7;--mint:#06ffa5;
      --script:'Dancing Script',cursive;--body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100dvh; overflow-x:hidden;
      font-family:var(--body); color:white;
      padding-bottom:70px;
      background:
        radial-gradient(ellipse at 15% 0%,  #7209b7 0%, transparent 50%),
        radial-gradient(ellipse at 85% 100%,#e91e8c 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, #06ffa5 0%, transparent 35%),
        linear-gradient(160deg,#10001a 0%,#1a0030 50%,#000a14 100%);
    }

    .back-btn{
      position:fixed;top:16px;left:16px;z-index:300;
      padding:9px 18px;border:1px solid rgba(255,255,255,.3);border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;cursor:pointer;transition:.25s;
    }
    .back-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.05);}
    .lang-btn{
      position:fixed;top:16px;right:16px;z-index:300;
      padding:9px 18px;border:1px solid rgba(255,255,255,.3);border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;cursor:pointer;transition:.25s;
    }
    .lang-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.05);}

    .page-header{position:relative;z-index:10;text-align:center;padding:90px 20px 22px;}
    .header-icon{
      font-size:clamp(52px,14vw,72px);display:block;line-height:1;margin-bottom:8px;
      animation:spin 5s linear infinite;filter:drop-shadow(0 0 20px rgba(114,9,183,.6));
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .page-title{
      font-family:var(--script);font-size:clamp(30px,8vw,48px);font-weight:700;
      background:linear-gradient(90deg,#c77dff,#06ffa5,#e91e8c,#c77dff);
      background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:shimmer 3.5s linear infinite;line-height:1.2;
    }
    @keyframes shimmer{to{background-position:200% center}}
    .page-sub{font-size:14px;opacity:.78;margin-top:6px;font-weight:600;}

    #container{
      position:relative;z-index:10;width:min(600px,94vw);margin:24px auto 0;
      display:flex;flex-direction:column;gap:16px;
    }
    .song-card{
      display:flex;align-items:center;gap:16px;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.24);
      backdrop-filter:blur(22px);border-radius:24px;padding:16px 18px;
      box-shadow:0 10px 36px rgba(114,9,183,.22), inset 0 1px 0 rgba(255,255,255,.26);
      opacity:0;transform:translateY(20px);transition:opacity .5s ease, transform .5s ease;
    }
    .song-card.show{opacity:1;transform:translateY(0);}

    .disc{
      flex:none;width:58px;height:58px;border-radius:50%;
      background:radial-gradient(circle,#1a0030 35%,#7209b7 36%,#1a0030 60%);
      display:flex;align-items:center;justify-content:center;font-size:24px;
      border:2px solid rgba(255,255,255,.3);
    }
    .disc.playing{animation:spin 3.5s linear infinite;}

    .song-info{flex:1;min-width:0;}
    .song-title{font-family:var(--script);font-size:clamp(17px,4.5vw,21px);font-weight:700;color:var(--mint);line-height:1.3;}
    .song-note{font-size:clamp(11px,3vw,13px);opacity:.75;margin-top:3px;line-height:1.4;}

    .play-btn{
      flex:none;width:46px;height:46px;border-radius:50%;border:none;
      background:linear-gradient(135deg,#c77dff,#e91e8c);
      color:white;font-size:18px;cursor:pointer;transition:.25s;
      box-shadow:0 6px 20px rgba(199,125,255,.4);
    }
    .play-btn:hover{transform:scale(1.08);}

    .eq{display:flex;gap:2px;align-items:center;height:18px;margin-top:4px;}
    .eq span{width:3px;background:var(--mint);border-radius:2px;animation:eqBar .8s ease-in-out infinite;}
    .eq span:nth-child(2){animation-delay:.15s} .eq span:nth-child(3){animation-delay:.3s}
    @keyframes eqBar{0%,100%{height:4px}50%{height:16px}}

    .loading-wrap{text-align:center;padding:40px;opacity:.7;}

    .floaty{position:fixed;pointer-events:none;z-index:1;animation:floatUp linear forwards;}
    @keyframes floatUp{0%{transform:translateY(0) rotate(0);opacity:0}5%{opacity:1}95%{opacity:.8}100%{transform:translateY(-115dvh) rotate(720deg);opacity:0}}
  </style>
</head>
<body>

  <button class="back-btn" onclick="goBack()">← Back</button>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 தமிழ்</button>

  <div class="page-header">
    <span class="header-icon">🎵</span>
    <h1 class="page-title" id="pageTitle">Songs For You, Mom</h1>
    <p class="page-sub" id="pageSub">Tap a track to play it 🎧</p>
  </div>

  <div id="container"></div>

  <script>
    let lang='en', songs=[], currentAudio=null, currentBtn=null, currentDisc=null;

    const T={
      en:{title:"Songs For You, Mom", sub:"Tap a track to play it 🎧", loading:"Loading playlist…", empty:"No songs added yet 🎵"},
      ta:{title:"உங்களுக்காக பாடல்கள், அம்மா", sub:"ஒரு பாடலை தட்டி இசையை கேளுங்கள் 🎧", loading:"பட்டியல் ஏற்றப்படுகிறது…", empty:"இன்னும் பாடல்கள் சேர்க்கப்படவில்லை 🎵"}
    };

    function renderSongs(){
      document.getElementById('pageTitle').textContent=T[lang].title;
      document.getElementById('pageSub').textContent=T[lang].sub;
      const container=document.getElementById('container');
      container.innerHTML='';

      if(!songs.length){
        container.innerHTML=`<div class="loading-wrap">${T[lang].empty}</div>`;
        return;
      }

      songs.forEach((s,i)=>{
        const div=document.createElement('div');
        div.className='song-card';
        div.innerHTML=`
          <div class="disc" id="disc-${i}">${s.emoji||'🎵'}</div>
          <div class="song-info">
            <div class="song-title">${s.title[lang]}</div>
            <div class="song-note">${s.note[lang]}</div>
            <div class="eq" id="eq-${i}" style="display:none;"><span></span><span></span><span></span></div>
          </div>
          <button class="play-btn" id="btn-${i}" onclick="togglePlay(${i})">▶</button>`;
        container.appendChild(div);
        setTimeout(()=>div.classList.add('show'), 100+i*130);
      });
    }

    async function loadSongs(){
      document.getElementById('container').innerHTML=`<div class="loading-wrap">${T[lang].loading}</div>`;
      try{
        const res=await fetch('/api/birthday/playlist');
        songs=await res.json();
      }catch(e){ songs=[]; }
      renderSongs();
    }

    function togglePlay(i){
      const btn=document.getElementById('btn-'+i);
      const disc=document.getElementById('disc-'+i);
      const eq=document.getElementById('eq-'+i);

      if(currentAudio && currentBtn===btn && !currentAudio.paused){
        currentAudio.pause();
        btn.textContent='▶'; disc.classList.remove('playing'); eq.style.display='none';
        return;
      }

      if(currentAudio){
        currentAudio.pause();
        if(currentBtn) currentBtn.textContent='▶';
        if(currentDisc) currentDisc.classList.remove('playing');
      }

      const audio=new Audio(songs[i].src);
      audio.play().catch(()=>{});
      btn.textContent='⏸'; disc.classList.add('playing'); eq.style.display='flex';

      audio.onended=()=>{ btn.textContent='▶'; disc.classList.remove('playing'); eq.style.display='none'; };

      currentAudio=audio; currentBtn=btn; currentDisc=disc;
    }

    function toggleLang(){
      lang=lang==='en'?'ta':'en';
      document.getElementById('langBtn').textContent=lang==='en'?'🌐 தமிழ்':'🌐 English';
      renderSongs();
    }

    function goBack(){
      if(currentAudio) currentAudio.pause();
      window.location.href='/surprice.html';
    }

    const emojis=['🎵','🎶','💖','✨','🌸'];
    function spawnFloat(){
      const e=document.createElement('div'); e.className='floaty';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText=`left:${Math.random()*100}vw;bottom:-20px;font-size:${14+Math.random()*16}px;
        animation-duration:${6+Math.random()*5}s;`;
      document.body.appendChild(e); setTimeout(()=>e.remove(),11000);
    }
    setInterval(spawnFloat,650);

    loadSongs();
  </script>
</body>
</html>
