<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memories Orbit 📸</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at top, #ff4d6d, #219ebc, #023047);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    .floating-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .float-item {
      position: absolute;
      top: -50px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px) rotate(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0.8;
      }
    }

    .hero {
      text-align: center;
      z-index: 10;
    }

    .title {
      font-size: 42px;
      font-family: 'Great Vibes', cursive;
      background: linear-gradient(90deg, #fff, #ffdd57, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 5px #fff);
      }

      to {
        filter: drop-shadow(0 0 20px #ffdd57);
      }
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    .showBtn {
      background: linear-gradient(45deg, #ff4d6d, #ffdd57);
      color: #000;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transform: scale(1.2);
    }

    .showBtn:hover {
      transform: scale(1.3);
    }

    .tamilBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: white;
      color: black;
      border-radius: 20px;
      padding: 8px 14px;
      font-weight: bold;
      z-index: 100;
    }

    .backBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 25px;
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .scene {
      width: 300px;
      height: 300px;
      perspective: 1000px;
      opacity: 0;
      transform: scale(0.5);
      transition: 1s ease;
      position: absolute;
    }

    .scene.active {
      opacity: 1;
      transform: scale(1);
    }

    .ring {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: rotate 18s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotateY(0deg);
      }

      to {
        transform: rotateY(360deg);
      }
    }

    .card {
      position: absolute;
      width: 140px;
      height: 180px;
      left: 50%;
      top: 50%;
      margin: -90px -70px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .card img {
      width: 100%;
      height: 75%;
      object-fit: cover;
    }

    .card p {
      font-size: 12px;
      padding: 5px;
      text-align: center;
    }

    .hint {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <audio id="bgMusic" loop>
    <source src="/music/Vikram Vedha Love Bgm.mp3" type="audio/mpeg">
  </audio>

  <div class="floating-container"></div>
  <button class="backBtn" onclick="goBack()">⬅ Back</button>

  <button class="btn tamilBtn" onclick="toggleLang()">🌐 தமிழ்</button>

  <div class="hero" id="hero">
    <div class="title">Memories for You 💖</div>
    <div class="subtitle">A small world of love, laughter & moments</div>

    <button class="btn showBtn" onclick="startExperience()">
      📸 Show Memories
    </button>

    <div class="hint">Click to enter memory world ✨</div>
  </div>

  <div class="scene" id="scene">
    <div class="ring" id="ring"></div>
  </div>

  <script>

    let memoriesData = [];
    let currentLang = "en";
    let started = false;

    const music = document.getElementById("bgMusic");

    function startExperience() {
      if (started) return;
      started = true;

      music.play().catch(() => { });

      document.getElementById("hero").style.display = "none";
      document.getElementById("scene").classList.add("active");

      loadMemories();
    }

    function goBack() {
      window.location.href = "/surprice.html";
    }

    function toggleLang() {
      currentLang = currentLang === "en" ? "ta" : "en";
      renderRing();
    }

    async function loadMemories() {
      const res = await fetch("/api/birthday/memories");
      memoriesData = await res.json();
      renderRing();
    }

    function renderRing() {
      const ring = document.getElementById("ring");
      ring.innerHTML = "";

      const total = memoriesData.length;
      const radius = 350;

      memoriesData.forEach((m, i) => {

        const angle = (i / total) * 360;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${m.image}">
          <p>${m.caption[currentLang]}</p>
        `;

        card.style.transform =
          `rotateY(${angle}deg) translateZ(${radius}px)`;

        ring.appendChild(card);
      });
    }

    const items = ["🌸", "🌹", "💐", "🌺", "✨", "❤️", "🍫"];

    function createFloatingItem() {
      const el = document.createElement("div");
      el.className = "float-item";

      el.innerHTML = items[Math.floor(Math.random() * items.length)];

      el.style.left = Math.random() * 100 + "vw";
      el.style.fontSize = (20 + Math.random() * 30) + "px";
      el.style.animationDuration = (10 + Math.random() * 10) + "s";

      document.querySelector(".floating-container").appendChild(el);

      setTimeout(() => el.remove(), 20000);
    }

    setInterval(createFloatingItem, 500);

  </script>

</body>

</html>
