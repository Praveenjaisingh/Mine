<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letters 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --rose:#ff2d78; --coral:#ff6b6b; --peach:#ffb347; --gold:#ffd700;
      --magenta:#e91e8c; --lavender:#c77dff;
      --script:'Dancing Script',cursive; --body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100dvh; overflow-x:hidden;
      font-family:var(--body); color:white;
      padding-bottom:80px;
      background:
        radial-gradient(ellipse at 10% 0%,   #ff2d78 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, #ffb347 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%,  #7209b7 0%, transparent 60%),
        linear-gradient(160deg,#20001a 0%,#2d0040 50%,#0a0a1a 100%);
    }

    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{
      position:absolute;border-radius:50%;background:white;
      animation:twinkle ease-in-out infinite;
    }
    @keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.5)}}

    .back-btn{
      position:fixed;top:16px;left:16px;z-index:300;
      padding:9px 18px;border:1px solid rgba(255,255,255,.3);border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;
      cursor:pointer;transition:.25s;
    }
    .back-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.05);}

    .lang-btn{
      position:fixed;top:16px;right:16px;z-index:300;
      padding:9px 18px;border:1px solid rgba(255,255,255,.3);border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;
      cursor:pointer;transition:.25s;
    }
    .lang-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.05);}

    .music-btn{
      position:fixed;bottom:20px;right:20px;z-index:300;
      width:52px;height:52px;border-radius:50%;
      border:1px solid rgba(255,255,255,.3);
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-size:22px;cursor:pointer;transition:.25s;
    }
    .music-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.08);}

    .page-header{
      position:relative;z-index:10;
      text-align:center;
      padding:90px 20px 32px;
    }

    .header-icon{
      font-size:clamp(52px,14vw,72px);
      display:block;line-height:1;margin-bottom:10px;
      animation:iconFloat 3s ease-in-out infinite;
      filter:drop-shadow(0 0 20px rgba(255,215,0,.6));
    }
    @keyframes iconFloat{
      0%,100%{transform:translateY(0) rotate(-4deg)}
      50%{transform:translateY(-12px) rotate(4deg)}
    }

    .page-title{
      font-family:var(--script);font-size:clamp(32px,9vw,52px);font-weight:700;
      background:linear-gradient(90deg,#ffd700,#ff6b6b,#c77dff,#ffd700);
      background-size:200%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:shimmer 3.5s linear infinite;line-height:1.2;
    }
    @keyframes shimmer{to{background-position:200% center}}

    .page-sub{
      font-size:14px;opacity:.75;margin-top:6px;font-weight:600;letter-spacing:.5px;
    }

    .ornament{
      display:flex;align-items:center;gap:12px;justify-content:center;
      margin:18px auto 0;max-width:300px;font-size:16px;opacity:.5;
    }
    .orn-line{flex:1;height:1px;background:rgba(255,255,255,.3);}

    #container{
      position:relative;z-index:10;
      max-width:860px;margin:0 auto;
      padding:0 16px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));
      gap:20px;
    }
    .card{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.22);
      backdrop-filter:blur(22px);
      border-radius:26px;
      padding:clamp(20px,4vw,30px);
      box-shadow:0 10px 36px rgba(255,45,120,.2), inset 0 1px 0 rgba(255,255,255,.28);
      position:relative;overflow:hidden;
      opacity:0;transform:translateY(30px) scale(.94) rotate(-2deg);
      transition:opacity .6s ease, transform .6s ease;
    }
    .card.show{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}
    .card:hover{transform:translateY(-5px) scale(1.02)!important;box-shadow:0 16px 48px rgba(255,45,120,.35);}

    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:var(--strip,linear-gradient(90deg,var(--rose),var(--peach)));
      border-radius:26px 26px 0 0;
    }

    .card-seal{
      position:absolute;top:16px;right:18px;
      font-size:22px;opacity:.7;
      animation:sealPulse 2.5s ease-in-out infinite;
    }
    @keyframes sealPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

    .card-number{
      font-size:10px;letter-spacing:3px;text-transform:uppercase;
      opacity:.45;margin-bottom:8px;font-weight:700;
    }

    .card h3{
      font-family:var(--script);font-size:clamp(20px,5vw,26px);font-weight:700;
      color:var(--gold);margin-bottom:12px;line-height:1.3;
    }

    .card p{
      font-size:clamp(13px,3.5vw,15px);line-height:1.8;opacity:.92;font-weight:400;
    }

    .card-footer{
      margin-top:16px;
      display:flex;align-items:center;gap:8px;
      font-size:11px;opacity:.4;letter-spacing:2px;
    }
    .card-footer-line{flex:1;height:1px;background:rgba(255,255,255,.25);}

    .card:nth-child(3n+1)::before{background:linear-gradient(90deg,var(--rose),var(--magenta));}
    .card:nth-child(3n+2)::before{background:linear-gradient(90deg,var(--lavender),var(--coral));}
    .card:nth-child(3n)::before  {background:linear-gradient(90deg,var(--peach),var(--gold));}

    .loading-wrap{
      grid-column:1/-1;text-align:center;padding:60px 20px;
    }
    .loading-dots span{
      display:inline-block;width:10px;height:10px;border-radius:50%;
      background:rgba(255,255,255,.5);margin:0 4px;
      animation:dotBounce .8s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2){animation-delay:.15s}
    .loading-dots span:nth-child(3){animation-delay:.3s}
    @keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-10px);opacity:1}}
    .loading-label{margin-top:12px;font-size:13px;opacity:.6;letter-spacing:2px;}

    .error-wrap{
      grid-column:1/-1;text-align:center;padding:60px 20px;
    }
    .error-wrap .error-icon{font-size:48px;margin-bottom:12px;}
    .error-wrap p{opacity:.7;font-size:14px;}

    .floaty{position:fixed;pointer-events:none;z-index:1;animation:floatUp linear forwards;}
    @keyframes floatUp{
      0%{transform:translateY(0) rotate(0);opacity:0}
      5%{opacity:1}95%{opacity:.8}
      100%{transform:translateY(-115dvh) rotate(720deg);opacity:0}
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .page-header{animation:fadeUp .7s ease both;}
  </style>
<style id="pt-style">
.pt-overlay{
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:radial-gradient(ellipse at 50% 40%, rgba(199,125,255,.28), transparent 60%),
             linear-gradient(160deg,rgba(26,0,20,.94),rgba(45,0,48,.94) 50%,rgba(26,10,34,.94));
  opacity:0; pointer-events:none; transition:opacity .25s ease;
  backdrop-filter:blur(8px);
}
.pt-overlay.show{ opacity:1; pointer-events:all; }
.pt-cake{ position:relative; width:80px; height:72px; display:flex; align-items:center; justify-content:center; }
.pt-cake-half{ position:absolute; font-size:56px; line-height:1; filter:drop-shadow(0 0 12px rgba(255,215,0,.55)); transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
.pt-cake-left{ clip-path:inset(0 50% 0 0); }
.pt-cake-right{ clip-path:inset(0 0 0 50%); }
.pt-overlay.show .pt-cake-left{ transform:translate(-9px,1px) rotate(-7deg); }
.pt-overlay.show .pt-cake-right{ transform:translate(9px,1px) rotate(7deg); }
.pt-knife{ position:absolute; font-size:26px; opacity:0; transform:rotate(38deg); }
.pt-overlay.show .pt-knife{ animation:ptKnife .6s ease forwards; }
@keyframes ptKnife{
  0%{ left:-30px; top:-30px; opacity:0; }
  15%{ opacity:1; }
  55%{ left:50%; top:46%; }
  100%{ left:120%; top:-30px; opacity:0; }
}
.pt-caption{ font-family:'Dancing Script',cursive; font-size:16px; font-weight:700; color:#ffd700; letter-spacing:.5px;
  text-shadow:0 0 10px rgba(255,45,120,.5); opacity:.95; }
</style>
</head>
<body>
  <div class="pt-overlay" id="ptOverlay">
    <div class="pt-cake">
      <div class="pt-cake-half pt-cake-left">🎂</div>
      <div class="pt-cake-half pt-cake-right">🎂</div>
      <div class="pt-knife">🔪</div>
    </div>
    <p class="pt-caption">Just a moment, love…</p>
  </div>


  <div class="stars" id="stars"></div>

  <audio id="bgMusic" loop>
    <source src="/music/Love Insurance Kompany - Dheema Song Bgm.mp3" type="audio/mpeg"/>
  </audio>

  <button class="back-btn" onclick="goBack()">← Back</button>
  <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">🌐 தமிழ்</button>
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🔊</button>

  <div class="page-header">
    <span class="header-icon">💌</span>
    <h1 class="page-title">Letters for You</h1>
    <p class="page-sub">Written from the heart, with all our love 💖</p>
    <div class="ornament">
      <div class="orn-line"></div>
      <span>✦ ✦ ✦</span>
      <div class="orn-line"></div>
    </div>
  </div>

  <div id="container"></div>

  <script>
    const music = document.getElementById('bgMusic');
    music.play().catch(()=>{});

    const starsEl = document.getElementById('stars');
    for(let i=0;i<55;i++){
      const s=document.createElement('div'); s.className='star';
      const sz=.8+Math.random()*2.5;
      s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
        animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s`;
      starsEl.appendChild(s);
    }

    const emojis=['🌸','💖','✨','🌺','💌','🎀','💝','🌷','🍫','❤️'];
    function spawnFloat(){
      const e=document.createElement('div'); e.className='floaty';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText=`left:${Math.random()*100}vw;bottom:-20px;font-size:${14+Math.random()*18}px;
        animation-duration:${6+Math.random()*5}s;`;
      document.body.appendChild(e); setTimeout(()=>e.remove(),11000);
    }
    setInterval(spawnFloat, 480);

    let currentLang = 'en';
    let lettersData = [];

    const seals = ['💌','🌸','💝','✨','💖','🌺'];

    function renderLetters(){
      const container = document.getElementById('container');
      container.innerHTML = '';

      if(!lettersData.length){
        container.innerHTML=`
          <div class="error-wrap">
            <div class="error-icon">💌</div>
            <p>No letters found yet…<br>Check back soon! 💕</p>
          </div>`;
        return;
      }

      lettersData.forEach((l, i) => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <div class="card-seal">${seals[i % seals.length]}</div>
          <div class="card-number">Letter ${String(i+1).padStart(2,'0')}</div>
          <h3>${l.title[currentLang]}</h3>
          <p>${l.message[currentLang]}</p>
          <div class="card-footer">
            <div class="card-footer-line"></div>
            <span>with love 💕</span>
            <div class="card-footer-line"></div>
          </div>`;

        container.appendChild(div);

        setTimeout(() => div.classList.add('show'), 120 + i * 160);
      });
    }

    async function loadLetters(){
      const container = document.getElementById('container');
      container.innerHTML = `
        <div class="loading-wrap">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <div class="loading-label">Loading your letters…</div>
        </div>`;

      try{
        const res = await fetch('/api/birthday/letters');
        lettersData = await res.json();
        renderLetters();
      } catch(e){
        container.innerHTML = `
          <div class="error-wrap">
            <div class="error-icon">💌</div>
            <p>Couldn't load letters right now.<br>Try again in a moment 💕</p>
          </div>`;
      }
    }

    function toggleLanguage(){
      currentLang = currentLang === 'en' ? 'ta' : 'en';
      document.getElementById('langBtn').textContent = currentLang==='en' ? '🌐 தமிழ்' : '🌐 English';
      renderLetters();
    }

    function toggleMusic(){
      music.paused ? music.play() : music.pause();
      document.getElementById('musicBtn').textContent = music.paused ? '🔇' : '🔊';
    }

    function goBack(){ goNav('/surprice.html'); }

    loadLetters();
  </script>
<script>
  function goNav(url){
    var ov = document.getElementById('ptOverlay');
    if(!ov){ window.location.href = url; return; }
    ov.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 620);
  }
</script>
</body>
</html>
