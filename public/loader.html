<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Loading… 💖</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --rose: #ff2d78;
      --coral: #ff6b6b;
      --peach: #ffb347;
      --gold: #ffd700;
      --magenta: #e91e8c;
      --lavender: #c77dff;
      --script: 'Dancing Script', cursive;
      --body: 'Nunito', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: var(--body);
      color: white;
      text-align: center;
      padding: 20px;
      background: radial-gradient(ellipse at 20% 0%, #ff2d78 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, #e91e8c 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, #c77dff 0%, transparent 70%),
        linear-gradient(160deg, #1a0014 0%, #2d0030 40%, #1a0a22 100%);
    }

    .bokeh-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bokeh {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, .25), transparent 70%);
      animation: bokehFloat linear infinite;
    }

    @keyframes bokehFloat {
      0% {
        transform: translateY(0) scale(1);
        opacity: .5;
      }

      50% {
        opacity: .8;
      }

      100% {
        transform: translateY(-110dvh) scale(1.3);
        opacity: 0;
      }
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle ease-in-out infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: .2;
        transform: scale(1)
      }

      50% {
        opacity: 1;
        transform: scale(1.4)
      }
    }

    .scene {
      position: relative;
      z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
    }

    .scene.active {
      display: flex;
    }

    .scene-caption {
      font-family: var(--script);
      font-weight: 700;
      font-size: clamp(20px, 6vw, 30px);
      background: linear-gradient(90deg, #ffd700, #ff6b6b, #c77dff, #ffd700);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite, fadeUp .7s ease both;
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .floaty {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 0;
      }

      8% {
        opacity: 1;
      }

      95% {
        opacity: .85;
      }

      100% {
        transform: translateY(-115dvh) rotate(540deg) scale(.8);
        opacity: 0;
      }
    }

    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      animation: petalFall linear forwards;
    }

    @keyframes petalFall {
      0% {
        transform:
          translateY(-40px) translateX(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform:
          translateY(110vh) translateX(var(--drift)) rotate(360deg);
        opacity: .85;
      }
    }

    .pop-particle {
      position: fixed;
      pointer-events: none;
      z-index: 6;
      font-size: 22px;
      animation: popOut .9s cubic-bezier(.2, .8, .3, 1) forwards;
    }

    @keyframes popOut {
      0% {
        transform: translate(-50%, -50%) scale(.3);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot));
        opacity: 0;
      }
    }

    /* ---------- scene 1 : heart opening ---------- */
    /* ---------- scene 1 : heart blast ---------- */

    .heart-wrap {
      position: relative;
      width: clamp(120px, 30vw, 170px);
      height: clamp(120px, 30vw, 170px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .heart-glow {
      position: absolute;
      inset: -40%;
      border-radius: 50%;
      background: radial-gradient(circle,
          rgba(255, 215, 0, .6),
          rgba(255, 45, 120, .3) 50%,
          transparent 75%);
      opacity: .8;
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {

      0%,
      100% {
        transform: scale(.9);
        opacity: .5;
      }

      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    .heart {
      font-size: clamp(90px, 22vw, 130px);
      line-height: 1;
      filter:
        drop-shadow(0 0 18px rgba(255, 45, 120, .7)) drop-shadow(0 0 28px rgba(255, 215, 0, .4));
    }

    .heart::before {
      content: '💖';
    }

    .heart.beat {
      animation: heartBeat 1s ease-in-out infinite;
    }

    @keyframes heartBeat {

      0%,
      100% {
        transform: scale(1);
      }

      25% {
        transform: scale(1.15);
      }

      50% {
        transform: scale(.95);
      }

      75% {
        transform: scale(1.12);
      }
    }

    .heart.blast {
      animation: heartBlast .9s ease forwards;
    }

    @keyframes heartBlast {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      40% {
        transform: scale(1.35);
      }

      70% {
        transform: scale(1.7);
        opacity: 1;
      }

      100% {
        transform: scale(2.3);
        opacity: 0;
      }
    }

    .cake-wrap {
      position: relative;
      width: clamp(130px, 32vw, 180px);
      height: clamp(120px, 30vw, 160px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cake-half {
      position: absolute;
      font-size: clamp(74px, 20vw, 100px);
      line-height: 1;
      filter: drop-shadow(0 0 18px rgba(255, 215, 0, .55));
      transition: transform .55s cubic-bezier(.34, 1.56, .64, 1);
    }

    .cake-left {
      clip-path: inset(0 50% 0 0);
    }

    .cake-right {
      clip-path: inset(0 0 0 50%);
    }

    .cake-wrap.cut .cake-left {
      transform: translate(-16px, 2px) rotate(-7deg);
    }

    .cake-wrap.cut .cake-right {
      transform: translate(16px, 2px) rotate(7deg);
    }

    .cake-wrap.cut::before {
      content: '';
      position: absolute;
      top: 6%;
      bottom: 10%;
      left: 50%;
      width: 3px;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, .85), transparent);
      transform: translateX(-50%);
      border-radius: 2px;
      animation: sliceFlash .5s ease both;
    }

    @keyframes sliceFlash {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .knife {
      position: absolute;
      font-size: clamp(34px, 9vw, 46px);
      opacity: 0;
      transform: rotate(38deg);
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, .4));
    }

    .knife.swipe {
      animation: knifeSwipe 1s ease forwards;
    }

    @keyframes knifeSwipe {
      0% {
        left: -46px;
        top: -46px;
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      55% {
        left: 50%;
        top: 48%;
      }

      72% {
        left: 62%;
        top: 58%;
      }

      100% {
        left: 160%;
        top: -50px;
        opacity: 0;
      }
    }

    .burst-emoji {
      font-size: clamp(60px, 16vw, 84px);
      animation: burstPulse 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 22px rgba(255, 215, 0, .6));
    }

    @keyframes burstPulse {

      0%,
      100% {
        transform: scale(1) rotate(0)
      }

      50% {
        transform: scale(1.15) rotate(-4deg)
      }
    }

    .big-emoji {
      font-size: clamp(80px, 20vw, 110px);
      animation: bigBounce 2s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(255, 215, 0, .7));
      line-height: 1;
    }

    @keyframes bigBounce {

      0%,
      100% {
        transform: translateY(0) scale(1)
      }

      40% {
        transform: translateY(-22px) scale(1.08)
      }

      60% {
        transform: translateY(-14px) scale(1.04)
      }
    }

    .main-title {
      font-family: var(--script);
      font-size: clamp(36px, 10vw, 64px);
      font-weight: 700;
      background: linear-gradient(90deg, #ffd700, #ffb347, #ff6b6b, #ff2d78, #c77dff, #ffd700);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      line-height: 1.15;
      letter-spacing: 1px;
    }

    .sub-title {
      font-size: clamp(15px, 4vw, 20px);
      font-weight: 600;
      opacity: .9;
      text-shadow: 0 2px 12px rgba(255, 45, 120, .6);
    }

    .ornament {
      font-size: 20px;
      letter-spacing: 10px;
      opacity: .6;
    }

    .progress-wrap {
      width: min(280px, 80vw);
      height: 6px;
      background: rgba(255, 255, 255, .15);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, #ff2d78, #ffb347, #ffd700);
      box-shadow: 0 0 10px rgba(255, 215, 0, .6);
    }

    .progress-fill.run {
      animation: loadFill 3.5s ease forwards;
    }

    @keyframes loadFill {
      to {
        width: 100%;
      }
    }

    .loading-text {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: .7;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .4
      }

      50% {
        opacity: .9
      }
    }

    #mainLoader>* {
      animation: fadeUp .7s ease both;
    }

    #mainLoader>*:nth-child(1) {
      animation-delay: .1s
    }

    #mainLoader>*:nth-child(2) {
      animation-delay: .3s
    }

    #mainLoader>*:nth-child(3) {
      animation-delay: .5s
    }

    #mainLoader>*:nth-child(4) {
      animation-delay: .7s
    }

    #mainLoader>*:nth-child(5) {
      animation-delay: .9s
    }

    #mainLoader>*:nth-child(6) {
      animation-delay: 1.1s
    }
  </style>
</head>

<body>

  <div class="bokeh-wrap" id="bokehWrap"></div>
  <div class="stars" id="stars"></div>

  <div class="scene active" id="scene-heart">
    <div class="heart-wrap">
      <div class="heart-glow"></div>
      <div class="heart beat" id="heartShape"></div>
    </div>
    <p class="scene-caption">Sending you lots of love…</p>
  </div>

  <div class="scene" id="scene-cake">
    <div class="cake-wrap" id="cakeWrap">
      <div class="cake-half cake-left">🎂</div>
      <div class="cake-half cake-right">🎂</div>
      <div class="knife" id="knife">🔪</div>
    </div>
    <p class="scene-caption">Cutting the first slice…</p>
  </div>

  <div class="scene" id="scene-burst">
    <div class="burst-emoji">🎉</div>
    <p class="scene-caption">Get ready for a little magic…</p>
  </div>

  <div class="scene" id="mainLoader">
    <div class="big-emoji">🎂</div>
    <div class="ornament">✦ ✦ ✦</div>
    <h1 class="main-title">Happy Birthday<br>Darling 💖</h1>
    <p class="sub-title">Something beautiful is waiting for you…</p>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="loading-text">Preparing your surprise ✨</p>
  </div>

  <script>
    const isMobile = window.innerWidth < 600;

    const starEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div'); s.className = 'star';
      const sz = 1 + Math.random() * 3;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random() * 100}%;left:${Math.random() * 100}%;
        animation-duration:${1.5 + Math.random() * 3}s;animation-delay:${Math.random() * 3}s`;
      starEl.appendChild(s);
    }
    const bw = document.getElementById('bokehWrap');
    const bColors = ['rgba(255,45,120,.3)', 'rgba(255,179,71,.3)', 'rgba(199,125,255,.3)', 'rgba(255,215,0,.25)'];
    for (let i = 0; i < 14; i++) {
      const b = document.createElement('div'); b.className = 'bokeh';
      const sz = 40 + Math.random() * 120;
      b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random() * 100}%;top:${80 + Math.random() * 60}%;
        background:radial-gradient(circle,${bColors[i % bColors.length]},transparent 70%);
        animation-duration:${8 + Math.random() * 10}s;animation-delay:${Math.random() * 6}s`;
      bw.appendChild(b);
    }

    function showScene(id) {
      document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function spawnFloaty(emojis, intervalMs) {
      setInterval(() => {
        const e = document.createElement('div'); e.className = 'floaty';
        e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.cssText = `left:${Math.random() * 100}vw;bottom:-30px;font-size:${18 + Math.random() * 22}px;
          animation-duration:${isMobile ? 5 + Math.random() * 2 : 4 + Math.random() * 3}s;`;
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 8000);
      }, intervalMs);
    }
    function spawnPopBurst(emojis, count) {
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div'); p.className = 'pop-particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 120;
        const dx = Math.cos(angle) * dist, dy = Math.sin(angle) * dist - 30;
        const rot = (Math.random() * 360 - 180) + 'deg';
        p.style.left = cx + 'px'; p.style.top = cy + 'px';
        p.style.setProperty('--dx', dx + 'px');
        p.style.setProperty('--dy', dy + 'px');
        p.style.setProperty('--rot', rot);
        p.style.fontSize = (16 + Math.random() * 16) + 'px';
        p.style.animationDelay = (Math.random() * 0.15) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1300);
      }
    }
    function spawnPetals() {
      const petals = ['🌸', '🌺', '🌷', '💮', '✨'];

      setInterval(() => {
        const p = document.createElement('div');
        p.className = 'petal';

        p.textContent =
          petals[Math.floor(Math.random() * petals.length)];

        p.style.left = Math.random() * 100 + 'vw';

        p.style.fontSize =
          (18 + Math.random() * 18) + 'px';

        p.style.setProperty(
          '--drift',
          (-80 + Math.random() * 160) + 'px'
        );

        p.style.animationDuration =
          (5 + Math.random() * 4) + 's';

        document.body.appendChild(p);

        setTimeout(() => p.remove(), 10000);

      }, 450);
    }

    const heartEmojis = ['💗', '💕', '💖', '💝', '✨'];
    const confettiEmojis = ['🎊', '🎉', '✨', '🍰', '💛'];
    const loveEmojis = ['🌸', '💖', '🎈', '✨', '🌺', '💐', '🎀', '💝', '🌷'];
    const finalEmojis = ['🌸', '💖', '🎈', '✨', '🌺', '🍫', '💐', '🎀', '💝', '🌷'];

    let t = 0;
    showScene('scene-heart');
    setTimeout(() => {
      document.getElementById('heartShape').classList.add('beat');
    }, 150);

    setTimeout(() => {
      const heart = document.getElementById('heartShape');

      heart.classList.remove('beat');
      heart.classList.add('blast');

      spawnPopBurst(
        ['💖', '💕', '💗', '💝', '✨', '🌸', '🌺', '🌷'],
        isMobile ? 22 : 35
      );
    }, 1100);

    t += 2200;
    setTimeout(() => { showScene('scene-cake'); }, t);
    setTimeout(() => { document.getElementById('knife').classList.add('swipe'); }, t + 250);
    setTimeout(() => {
      document.getElementById('cakeWrap').classList.add('cut');
      spawnPopBurst(confettiEmojis, isMobile ? 12 : 18);
    }, t + 250 + 560);

    t += 2200;
    setTimeout(() => {
      showScene('scene-burst');
      spawnPopBurst(loveEmojis, isMobile ? 10 : 14);
    }, t);

    t += 1500;
    setTimeout(() => {
      showScene('mainLoader');
      document.getElementById('progressFill').classList.add('run');
      spawnFloaty(finalEmojis, isMobile ? 800 : 350);
      setTimeout(() => { window.location.href = 'unlock.html'; }, isMobile ? 3500 : 4200);
    }, t);
  </script>
</body>

</html>
