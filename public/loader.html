<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Loading… 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:#ff2d78; --coral:#ff6b6b; --peach:#ffb347; --gold:#ffd700;
      --magenta:#e91e8c; --lavender:#c77dff;
      --script:'Dancing Script',cursive; --body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      min-height:100dvh; overflow:hidden;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      font-family:var(--body); color:white; text-align:center; padding:20px;
      background: radial-gradient(ellipse at 20% 0%,   #ff2d78 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 100%, #e91e8c 0%, transparent 55%),
                  radial-gradient(ellipse at 50% 50%,  #c77dff 0%, transparent 70%),
                  linear-gradient(160deg, #1a0014 0%, #2d0030 40%, #1a0a22 100%);
    }

    .bokeh-wrap { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .bokeh {
      position:absolute; border-radius:50%;
      background: radial-gradient(circle, rgba(255,255,255,.25), transparent 70%);
      animation: bokehFloat linear infinite;
    }
    @keyframes bokehFloat {
      0%   { transform: translateY(0) scale(1); opacity:.5; }
      50%  { opacity:.8; }
      100% { transform: translateY(-110dvh) scale(1.3); opacity:0; }
    }

    .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .star {
      position:absolute; border-radius:50%;
      background:white; animation:twinkle ease-in-out infinite;
    }
    @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
    .content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; gap:16px; }

    .big-emoji {
      font-size: clamp(80px,20vw,110px);
      animation: bigBounce 2s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(255,215,0,.7));
      line-height:1;
    }
    @keyframes bigBounce {
      0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(-22px) scale(1.08)} 60%{transform:translateY(-14px) scale(1.04)}
    }

    .main-title {
      font-family:var(--script); font-size:clamp(36px,10vw,64px); font-weight:700;
      background: linear-gradient(90deg,#ffd700,#ffb347,#ff6b6b,#ff2d78,#c77dff,#ffd700);
      background-size:200% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite;
      line-height:1.15; letter-spacing:1px;
    }
    @keyframes shimmer { to { background-position: 200% center; } }

    .sub-title {
      font-size:clamp(15px,4vw,20px); font-weight:600; opacity:.9;
      text-shadow:0 2px 12px rgba(255,45,120,.6);
    }

    .ornament { font-size:20px; letter-spacing:10px; opacity:.6; }

    .progress-wrap {
      width:min(280px,80vw); height:6px;
      background:rgba(255,255,255,.15); border-radius:3px; overflow:hidden;
      margin-top:8px;
    }
    .progress-fill {
      height:100%; width:0%; border-radius:3px;
      background:linear-gradient(90deg,#ff2d78,#ffb347,#ffd700);
      box-shadow:0 0 10px rgba(255,215,0,.6);
      animation:loadFill 3.5s ease forwards;
    }
    @keyframes loadFill { to { width:100%; } }

    .loading-text {
      font-size:13px; letter-spacing:3px; text-transform:uppercase;
      opacity:.7; animation:pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }

    .floaty {
      position:fixed; pointer-events:none; z-index:1;
      animation:floatUp linear forwards;
    }
    @keyframes floatUp {
      0%  {transform:translateY(0) rotate(0deg);   opacity:0;}
      5%  {opacity:1;}
      95% {opacity:.8;}
      100%{transform:translateY(-115dvh) rotate(720deg); opacity:0;}
    }

    .content > * { animation:fadeUp .7s ease both; }
    .content > *:nth-child(1){animation-delay:.1s}
    .content > *:nth-child(2){animation-delay:.3s}
    .content > *:nth-child(3){animation-delay:.5s}
    .content > *:nth-child(4){animation-delay:.7s}
    .content > *:nth-child(5){animation-delay:.9s}
    .content > *:nth-child(6){animation-delay:1.1s}
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>

  <div class="bokeh-wrap" id="bokehWrap"></div>
  <div class="stars" id="stars"></div>

  <div class="content">
    <div class="big-emoji">🎂</div>
    <div class="ornament">✦ ✦ ✦</div>
    <h1 class="main-title">Happy Birthday<br>Darling 💖</h1>
    <p class="sub-title">Something beautiful is waiting for you…</p>
    <div class="progress-wrap"><div class="progress-fill"></div></div>
    <p class="loading-text">Preparing your surprise ✨</p>
  </div>

  <script>
    const starEl = document.getElementById('stars');
    for(let i=0;i<60;i++){
      const s=document.createElement('div'); s.className='star';
      const sz=1+Math.random()*3;
      s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
        animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
      starEl.appendChild(s);
    }

    const bw=document.getElementById('bokehWrap');
    const bColors=['rgba(255,45,120,.3)','rgba(255,179,71,.3)','rgba(199,125,255,.3)','rgba(255,215,0,.25)'];
    for(let i=0;i<14;i++){
      const b=document.createElement('div'); b.className='bokeh';
      const sz=40+Math.random()*120;
      b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${80+Math.random()*60}%;
        background:radial-gradient(circle,${bColors[i%bColors.length]},transparent 70%);
        animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*6}s`;
      bw.appendChild(b);
    }

    const emojis=['🌸','💖','🎈','✨','🌺','🍫','💐','🎀','💝','🌷'];
    const isMobile=window.innerWidth<600;
    function spawnEmoji(){
      const e=document.createElement('div'); e.className='floaty';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText=`left:${Math.random()*100}vw;bottom:-30px;font-size:${18+Math.random()*22}px;
        animation-duration:${isMobile?5+Math.random()*2:4+Math.random()*3}s;`;
      document.body.appendChild(e);
      setTimeout(()=>e.remove(),8000);
    }
    setInterval(spawnEmoji, isMobile?800:350);
    for(let i=0;i<6;i++) setTimeout(spawnEmoji, i*200);

    setTimeout(()=>{ window.location.href='unlock.html'; }, isMobile?3500:4200);
  </script>
</body>
</html>
