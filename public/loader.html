<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Loading...</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background:
        radial-gradient(circle at top left, #ff006e, transparent 40%),
        radial-gradient(circle at bottom right, #8338ec, transparent 40%),
        radial-gradient(circle at center, #3a86ff, transparent 60%),
        linear-gradient(120deg, #0f0c29, #302b63, #24243e);

      background-size: 200% 200%;
      animation: bgMove 12s ease-in-out infinite;
    }

    @keyframes bgMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    h1 {
      font-size: clamp(22px, 5vw, 40px);
      max-width: 90%;
      line-height: 1.4;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.5);
      animation:
        glow 2.5s ease-in-out infinite;
    }

    @keyframes glow {

      0%,
      100% {
        text-shadow:
          0 0 10px #ff4d6d,
          0 0 20px #8338ec;
      }

      50% {
        text-shadow:
          0 0 15px #3a86ff,
          0 0 25px #ff006e;
      }
    }

    .loader {
      margin-top: 15px;
      font-size: clamp(14px, 3vw, 18px);
      opacity: 0.85;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.6;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }

    .emoji {
      position: absolute;
      bottom: -30px;
      pointer-events: none;
      will-change: transform, opacity;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {

      body {
        animation: none;
        background-size: cover;
      }

      h1 {
        animation: none;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.45);
      }

      .loader {
        animation-duration: 2s;
      }
    }
  </style>
</head>

<body>

  <h1>💖 Happy Birthday Darling 💖</h1>

  <div class="loader">
    Loading your surprise...
  </div>

  <script>
    const isMobile = window.innerWidth < 600;

    const emojis = ["🎈", "💖", "🎂", "✨", "🌸"];

    let activeEmojis = 0;

    const MAX_EMOJIS = isMobile ? 8 : 18;

    function spawnEmoji() {

      if (activeEmojis >= MAX_EMOJIS) return;

      activeEmojis++;

      const e = document.createElement("div");

      e.className = "emoji";

      e.innerHTML =
        emojis[Math.floor(Math.random() * emojis.length)];

      e.style.left = Math.random() * 100 + "vw";

      e.style.fontSize =
        (isMobile
          ? 18 + Math.random() * 12
          : 22 + Math.random() * 20) + "px";

      e.style.animationDuration =
        (isMobile
          ? 5 + Math.random() * 2
          : 4 + Math.random() * 3) + "s";

      document.body.appendChild(e);

      setTimeout(() => {
        e.remove();
        activeEmojis--;
      }, 7000);
    }

    setInterval(
      spawnEmoji,
      isMobile ? 900 : 250
    );

    setTimeout(() => {
      window.location.href = "unlock.html";
    }, isMobile ? 3000 : 4500);

  </script>

</body>

</html>
