<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <title>Flip & Win 🎁</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg-1: #170226;
      --bg-2: #2c0a47;
      --rose: #ff3f7f;
      --rose-deep: #c2185b;
      --gold: #ffd76a;
      --mint: #52f5c2;
      --violet: #9b6bff;
      --cream: #fff7ec;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.22);
      --script: 'Dancing Script', cursive;
      --body: 'Nunito', sans-serif;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { min-height: 100dvh; }

    body {
      overflow-x: hidden;
      font-family: var(--body);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: calc(40px + var(--safe-b));
      background:
        radial-gradient(circle at 18% 15%, rgba(255, 63, 127, .55) 0%, transparent 42%),
        radial-gradient(circle at 85% 8%, rgba(255, 215, 106, .35) 0%, transparent 38%),
        radial-gradient(circle at 50% 95%, rgba(155, 107, 255, .45) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      position: relative;
    }

    .sparkle-field { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .sparkle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); opacity: .55; animation: drift linear infinite; }
    @keyframes drift { from { transform: translateY(110vh) translateX(0) scale(.6); opacity: 0; } 10% { opacity: .6; } to { transform: translateY(-10vh) translateX(20px) scale(1.1); opacity: 0; } }

    .petal-field { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal {
      position: absolute;
      bottom: -60px;
      will-change: transform, opacity;
      animation: riseUp linear forwards;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.25));
    }
    @keyframes riseUp {
      0%   { transform: translateY(0) translateX(0) rotate(0deg) scale(.7); opacity: 0; }
      8%   { opacity: .9; }
      50%  { transform: translateY(-60vh) translateX(var(--drift, 30px)) rotate(180deg) scale(1); }
      88%  { opacity: .8; }
      100% { transform: translateY(-125vh) translateX(calc(var(--drift, 30px) * 2)) rotate(360deg) scale(.85); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .sparkle, .petal { animation: none; display: none; }
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }

    .back-btn, .lang-btn {
      position: fixed;
      top: calc(14px + var(--safe-t));
      z-index: 300;
      padding: 9px 16px;
      min-height: 40px;
      border-radius: 50px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(6px);
      color: var(--cream);
      font-weight: 700;
      font-size: clamp(12px, 3.4vw, 14px);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn { left: 14px; }
    .lang-btn { right: 14px; }
    .back-btn:active, .lang-btn:active { transform: scale(.95); }

    .music-btn {
      position: fixed;
      bottom: calc(18px + var(--safe-b));
      right: 16px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(6px);
      color: var(--cream);
      font-size: 19px;
      cursor: pointer;
      z-index: 300;
    }

    .page-header {
      text-align: center;
      padding: calc(78px + var(--safe-t)) 20px 6px;
      z-index: 1;
    }

    .page-title {
      font-family: var(--script);
      font-size: clamp(32px, 9vw, 44px);
      line-height: 1;
      background: linear-gradient(90deg, var(--rose), var(--gold), var(--mint), var(--rose));
      background-size: 250% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 5s linear infinite;
    }
    @keyframes shine { to { background-position: 250% 0; } }

    .page-sub { font-size: clamp(12px, 3.4vw, 14px); opacity: .82; margin-top: 4px; }

    .stat-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .stat-chip {
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      font-size: clamp(11px, 3vw, 12.5px);
      font-weight: 700;
      letter-spacing: .2px;
    }

    .tracker-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 14px;
      padding: 0 14px;
      max-width: 460px;
      z-index: 1;
    }
    .tracker-chip {
      padding: 7px 11px;
      border-radius: 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      font-size: clamp(11px, 3vw, 12.5px);
      font-weight: 700;
      opacity: .55;
      transition: .35s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tracker-chip.done {
      opacity: 1;
      background: linear-gradient(135deg, rgba(255, 215, 106, .25), rgba(255, 63, 127, .25));
      border-color: var(--gold);
      box-shadow: 0 0 14px rgba(255, 215, 106, .35);
    }

    .board {
      width: min(440px, 94vw);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2.4vw, 12px);
      margin-top: 22px;
      z-index: 1;
    }

    .card { aspect-ratio: 1; perspective: 900px; cursor: pointer; touch-action: manipulation; }
    .inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.2,.8,.2,1); }
    .card.flip .inner { transform: rotateY(180deg); }

    .face { position: absolute; inset: 0; border-radius: 14px; display: flex; align-items: center; justify-content: center; backface-visibility: hidden; overflow: hidden; }

    .back {
      background: linear-gradient(150deg, var(--rose-deep), var(--violet));
      border: 1px solid rgba(255, 255, 255, .25);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 4px 10px rgba(0,0,0,.25);
    }
    .back::before, .back::after {
      content: ""; position: absolute; background: var(--gold); opacity: .9;
    }
    .back::before { width: 22%; height: 130%; top: -15%; left: 39%; border-radius: 2px; }
    .back::after { width: 130%; height: 22%; left: -15%; top: 39%; border-radius: 2px; }
    .back .bow { position: absolute; top: 34%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(18px, 5vw, 24px); z-index: 2; filter: drop-shadow(0 2px 3px rgba(0,0,0,.3)); }

    .front {
      transform: rotateY(180deg);
      background: var(--glass);
      border: 1px solid var(--glass-border);
    }
    .front img { width: 100%; height: 100%; object-fit: cover; }

    .card.matched .front { box-shadow: inset 0 0 0 2px var(--mint), 0 0 16px rgba(82, 245, 194, .55); }
    .card.shake .inner { animation: shake .4s; }
    @keyframes shake { 0%,100% { transform: rotateY(180deg) translateX(0); } 25% { transform: rotateY(180deg) translateX(-4px); } 75% { transform: rotateY(180deg) translateX(4px); } }

    .reset-btn {
      margin: 24px 0 4px;
      padding: 13px 28px;
      min-height: 46px;
      border-radius: 30px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(135deg, rgba(255,63,127,.35), rgba(155,107,255,.35));
      color: var(--cream);
      font-weight: 800;
      font-size: clamp(13px, 3.6vw, 15px);
      cursor: pointer;
      z-index: 1;
    }
    .reset-btn:active { transform: scale(.97); }

    .confetti { position: fixed; top: -10px; z-index: 500; animation: fall linear forwards; pointer-events: none; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

    .overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(10, 0, 20, .72);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    .reveal-card {
      width: min(320px, 88vw);
      background: linear-gradient(165deg, #2c0a47, #1b0630);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 18px 18px 22px;
      text-align: center;
      position: relative;
      transform: scale(.8) translateY(20px);
      opacity: 0;
      transition: transform .45s cubic-bezier(.2,.9,.25,1.2), opacity .35s;
      box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
    .overlay.show .reveal-card { transform: scale(1) translateY(0); opacity: 1; }

    .reveal-lid {
      width: 86%;
      height: 64px;
      margin: -38px auto 6px;
      background: linear-gradient(135deg, var(--gold), #ffb347);
      border-radius: 10px 10px 4px 4px;
      transform-origin: top center;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 6px 14px rgba(0,0,0,.3);
      transition: transform .55s cubic-bezier(.4,0,.2,1) .15s, opacity .3s .15s;
    }
    .overlay.show .reveal-lid { transform: rotateX(-130deg) translateY(-6px); opacity: .15; }

    .reveal-photo {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 4px;
      border: 1px solid var(--glass-border);
    }
    .reveal-photo img { width: 100%; height: 100%; object-fit: cover; }

    .reveal-emoji { font-size: 28px; margin: 12px 0 4px; }
    .reveal-label { font-family: var(--script); font-size: 22px; color: var(--gold); }
    .reveal-msg { font-size: 13.5px; line-height: 1.5; opacity: .92; margin-top: 8px; }

    .reveal-btn {
      margin-top: 16px;
      padding: 10px 24px;
      min-height: 42px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      color: white;
      font-weight: 800;
      font-size: 13.5px;
      cursor: pointer;
    }

    .finale-card { width: min(340px, 90vw); }
    .finale-card .reveal-emoji { font-size: 40px; }
    .finale-card .reveal-msg { font-size: 15px; }

    audio { display: none; }

    @media (max-width: 360px) {
      .page-title { font-size: 30px; }
      .board { gap: 7px; }
    }
  </style>
<style id="pt-style">
.pt-overlay{
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:radial-gradient(ellipse at 50% 40%, rgba(199,125,255,.28), transparent 60%),
             linear-gradient(160deg,rgba(26,0,20,.94),rgba(45,0,48,.94) 50%,rgba(26,10,34,.94));
  opacity:0; pointer-events:none; transition:opacity .25s ease;
  backdrop-filter:blur(8px);
}
.pt-overlay.show{ opacity:1; pointer-events:all; }
.pt-cake{ position:relative; width:80px; height:72px; display:flex; align-items:center; justify-content:center; }
.pt-cake-half{ position:absolute; font-size:56px; line-height:1; filter:drop-shadow(0 0 12px rgba(255,215,0,.55)); transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
.pt-cake-left{ clip-path:inset(0 50% 0 0); }
.pt-cake-right{ clip-path:inset(0 0 0 50%); }
.pt-overlay.show .pt-cake-left{ transform:translate(-9px,1px) rotate(-7deg); }
.pt-overlay.show .pt-cake-right{ transform:translate(9px,1px) rotate(7deg); }
.pt-knife{ position:absolute; font-size:26px; opacity:0; transform:rotate(38deg); }
.pt-overlay.show .pt-knife{ animation:ptKnife .6s ease forwards; }
@keyframes ptKnife{
  0%{ left:-30px; top:-30px; opacity:0; }
  15%{ opacity:1; }
  55%{ left:50%; top:46%; }
  100%{ left:120%; top:-30px; opacity:0; }
}
.pt-caption{ font-family:'Dancing Script',cursive; font-size:16px; font-weight:700; color:#ffd700; letter-spacing:.5px;
  text-shadow:0 0 10px rgba(255,45,120,.5); opacity:.95; }
</style>
</head>

<body>
  <div class="pt-overlay" id="ptOverlay">
    <div class="pt-cake">
      <div class="pt-cake-half pt-cake-left">🎂</div>
      <div class="pt-cake-half pt-cake-right">🎂</div>
      <div class="pt-knife">🔪</div>
    </div>
    <p class="pt-caption">Just a moment, love…</p>
  </div>


  <div class="sparkle-field" id="sparkleField"></div>
  <div class="petal-field" id="petalField"></div>

  <audio id="bgMusic" loop>
    <source src="/music/Vikram%20Vedha%20Love%20Bgm.mp3" type="audio/mpeg" />
  </audio>

  <button class="back-btn" onclick="goBack()" id="backBtn">← Back</button>
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">🌐 தமிழ்</button>
  <button class="music-btn" onclick="toggleMusic()" id="musicBtn">🔊</button>

  <div class="page-header">
    <div class="page-title">Flip & Win</div>
    <div class="page-sub" id="pageSub">Match all 6 memories to unlock your gifts 🎁</div>
    <div class="stat-row">
      <div class="stat-chip">🃏 <span id="movesLabel">Moves</span>: <span id="movesCount">0</span></div>
      <div class="stat-chip">🎁 <span id="foundLabel">Found</span>: <span id="foundCount">0</span>/6</div>
    </div>
  </div>

  <div class="tracker-row" id="tracker"></div>

  <div class="board" id="board"></div>

  <button class="reset-btn" onclick="restart()" id="resetBtn">🔁 Restart</button>

  <div class="overlay" id="revealOverlay">
    <div class="reveal-card" id="revealCard">
      <div class="reveal-lid">🎁</div>
      <div class="reveal-photo"><img id="revealImg" src="" alt=""></div>
      <div class="reveal-emoji" id="revealEmoji"></div>
      <div class="reveal-label" id="revealLabel"></div>
      <div class="reveal-msg" id="revealMsg"></div>
      <button class="reveal-btn" id="revealBtn" onclick="closeReveal()">Continue</button>
    </div>
  </div>

  <div class="overlay" id="finaleOverlay">
    <div class="reveal-card finale-card">
      <div class="reveal-lid">🎉</div>
      <div class="reveal-emoji">💖</div>
      <div class="reveal-msg" id="finaleMsg"></div>
      <button class="reveal-btn" onclick="closeFinale()" id="finaleBtn">Play again</button>
    </div>
  </div>

  <script>
    const UI = {
      en: {
        sub: "Match all 6 memories to unlock your gifts 🎁",
        moves: "Moves", found: "Found",
        back: "← Back", lang: "EN", music: "Music",
        continue: "Continue", playAgain: "Play again", restart: "🔁 Restart"
      },
      ta: {
        sub: "உங்கள் பரிசுகளை திறக்க 6 நினைவுகளையும் பொருத்துங்கள் 🎁",
        moves: "சுற்றுகள்", found: "கிடைத்தவை",
        back: "← Back", lang: "TA", music: "இசை",
        continue: "தொடரவும்", playAgain: "மீண்டும் விளையாடு", restart: "🔁 மீண்டும் தொடங்கு"
      }
    };

    let lang = (function () { try { return localStorage.getItem("flipwin_lang") || "en"; } catch (e) { return "en"; } })();
    const FALLBACK_CATEGORIES = [
      { key: "mom1", emoji: "❤️", label: { en: "Memory 1", ta: "நினைவு 1" }, items: [{ image: "images/shared image.png" }], gift: { en: "Beautiful memory unlocked ❤️", ta: "அழகான நினைவு திறக்கப்பட்டது ❤️" } },
      { key: "mom2", emoji: "💖", label: { en: "Memory 2", ta: "நினைவு 2" }, items: [{ image: "images/shared image1.jpeg" }], gift: { en: "Another sweet moment unlocked 💖", ta: "மற்றொரு இனிய நினைவு திறக்கப்பட்டது 💖" } },
      { key: "mom3", emoji: "🌸", label: { en: "Memory 3", ta: "நினைவு 3" }, items: [{ image: "images/shared image2.jpeg" }], gift: { en: "Precious memory unlocked 🌸", ta: "மிக மதிப்புள்ள நினைவு திறக்கப்பட்டது 🌸" } },
      { key: "mom4", emoji: "🎀", label: { en: "Memory 4", ta: "நினைவு 4" }, items: [{ image: "images/shared image3.png" }], gift: { en: "Lovely moment unlocked 🎀", ta: "அழகான தருணம் திறக்கப்பட்டது 🎀" } },
      { key: "mom5", emoji: "✨", label: { en: "Memory 5", ta: "நினைவு 5" }, items: [{ image: "images/shared image4.jpeg" }], gift: { en: "Heartwarming memory unlocked ✨", ta: "இதயத்தை நெகிழ்க்கும் நினைவு திறக்கப்பட்டது ✨" } },
      { key: "mom6", emoji: "💝", label: { en: "Memory 6", ta: "நினைவு 6" }, items: [{ image: "images/shared image5.png" }], gift: { en: "Final memory unlocked 💝", ta: "கடைசி நினைவு திறக்கப்பட்டது 💝" } }
    ];
    const FALLBACK_FINAL = { en: "You matched EVERYTHING, Mom! 🎉 All gifts — are yours!", ta: "நீங்கள் எல்லாவற்றையும் பொருத்திவிட்டீர்கள் அம்மா! 🎉 அனைத்து பரிசுகளும் — உங்களுடையதே!" };

    let CATEGORIES = FALLBACK_CATEGORIES;
    let FINAL_MSG = FALLBACK_FINAL;

    async function loadData() {
      try {
        const res = await fetch("/api/prize-categories");
        if (res.ok) {
          const data = await res.json();
          if (data && data.categories) CATEGORIES = data.categories;
          if (data && data.finalMessage) FINAL_MSG = data.finalMessage;
        }
      } catch (e) { /* offline / no backend route — fallback data already in use */ }
      init();
    }

    let deck = [], flipped = [], lock = false, moves = 0, foundCount = 0;
    const music = document.getElementById("bgMusic");

    function buildDeck() {
      let cards = [];
      CATEGORIES.forEach(cat => {
        cards.push({ catKey: cat.key, img: cat.items[0].image });
        cards.push({ catKey: cat.key, img: cat.items[0].image });
      });
      return cards.sort(() => Math.random() - 0.5).map((c, i) => ({ ...c, id: i, matched: false }));
    }

    function init() {
      deck = buildDeck();
      flipped = []; lock = false; moves = 0; foundCount = 0;

      const board = document.getElementById("board");
      board.innerHTML = "";

      deck.forEach(c => {
        const d = document.createElement("div");
        d.className = "card";
        d.id = "c" + c.id;
        d.innerHTML = `
          <div class="inner">
            <div class="face back"><span class="bow">🎀</span></div>
            <div class="face front"><img src="${c.img}" loading="lazy" alt=""></div>
          </div>`;
        d.onclick = () => flip(c.id);
        board.appendChild(d);
      });

      renderTracker();
      updateStats();
      applyTexts();
    }

    function renderTracker() {
      const t = document.getElementById("tracker");
      t.innerHTML = "";
      CATEGORIES.forEach(cat => {
        const chip = document.createElement("div");
        chip.className = "tracker-chip";
        chip.id = "chip-" + cat.key;
        chip.innerHTML = `<span>${cat.emoji}</span><span>${cat.label[lang]}</span>`;
        t.appendChild(chip);
      });
    }

    function updateStats() {
      document.getElementById("movesCount").textContent = moves;
      document.getElementById("foundCount").textContent = foundCount;
    }

    function flip(id) {
      if (lock) return;
      const card = deck.find(x => x.id === id);
      const el = document.getElementById("c" + id);
      if (card.matched || el.classList.contains("flip")) return;

      el.classList.add("flip");
      flipped.push(card);

      if (flipped.length === 2) {
        lock = true;
        moves++; updateStats();
        const [a, b] = flipped;

        if (a.img === b.img) {
          setTimeout(() => {
            a.matched = b.matched = true;
            document.getElementById("c" + a.id).classList.add("matched");
            document.getElementById("c" + b.id).classList.add("matched");
            burst();
            foundCount++; updateStats();
            const cat = CATEGORIES.find(c => c.key === a.catKey);
            document.getElementById("chip-" + cat.key).classList.add("done");
            flipped = []; lock = false;
            revealGift(cat);
          }, 380);
        } else {
          setTimeout(() => {
            const elA = document.getElementById("c" + a.id), elB = document.getElementById("c" + b.id);
            elA.classList.add("shake"); elB.classList.add("shake");
            setTimeout(() => {
              elA.classList.remove("flip", "shake");
              elB.classList.remove("flip", "shake");
              flipped = []; lock = false;
            }, 350);
          }, 650);
        }
      }
    }

    function revealGift(cat) {
      document.getElementById("revealImg").src = cat.items[0].image;
      document.getElementById("revealEmoji").textContent = cat.emoji;
      document.getElementById("revealLabel").textContent = cat.label[lang];
      document.getElementById("revealMsg").textContent = cat.gift[lang];
      document.getElementById("revealBtn").textContent = UI[lang].continue;
      document.getElementById("revealOverlay").classList.add("show");
    }

    function closeReveal() {
      document.getElementById("revealOverlay").classList.remove("show");
      if (foundCount >= CATEGORIES.length) {
        setTimeout(showFinale, 350);
      }
    }

    function showFinale() {
      document.getElementById("finaleMsg").textContent = FINAL_MSG[lang];
      document.getElementById("finaleBtn").textContent = UI[lang].playAgain;
      document.getElementById("finaleOverlay").classList.add("show");
      for (let i = 0; i < 30; i++) setTimeout(burst, i * 60);
    }

    function closeFinale() {
      document.getElementById("finaleOverlay").classList.remove("show");
      restart();
    }

    function restart() { init(); }

    const confettiEmoji = ["✨", "🎉", "💖", "🌸", "💛"];
    function burst() {
      const e = document.createElement("div");
      e.className = "confetti";
      e.textContent = confettiEmoji[Math.floor(Math.random() * confettiEmoji.length)];
      e.style.left = Math.random() * 100 + "vw";
      e.style.fontSize = (14 + Math.random() * 14) + "px";
      e.style.animationDuration = (1.1 + Math.random() * .8) + "s";
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 2000);
    }

    (function spawnSparkles() {
      const field = document.getElementById("sparkleField");
      const count = window.innerWidth < 480 ? 16 : 26;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDuration = (6 + Math.random() * 8) + "s";
        s.style.animationDelay = (Math.random() * 8) + "s";
        s.style.opacity = (0.3 + Math.random() * 0.4).toFixed(2);
        field.appendChild(s);
      }
    })();
    const petalEmoji = ["🌸", "💖", "❤️", "🌹", "💐", "🩷"];
    const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function spawnPetal() {
      const field = document.getElementById("petalField");
      const p = document.createElement("div");
      p.className = "petal";
      p.textContent = petalEmoji[Math.floor(Math.random() * petalEmoji.length)];
      const size = 14 + Math.random() * 16;
      const duration = 7 + Math.random() * 7;
      const drift = (Math.random() * 80 - 40) + "px";
      p.style.left = Math.random() * 96 + "vw";
      p.style.fontSize = size + "px";
      p.style.setProperty("--drift", drift);
      p.style.animationDuration = duration + "s";
      field.appendChild(p);
      p.addEventListener("animationend", () => p.remove());
    }

    if (!reduceMotion) {
      for (let i = 0; i < 6; i++) setTimeout(spawnPetal, i * 500);
      setInterval(spawnPetal, 900);
    }

    function toggleMusic() {
      if (music.paused) { music.play().catch(() => {}); document.getElementById("musicBtn").textContent = "🔊"; }
      else { music.pause(); document.getElementById("musicBtn").textContent = "🔈"; }
    }

    function goBack() {
      music.pause();
      goNav("/surprice.html");
    }

    function toggleLang() {
      lang = lang === "en" ? "ta" : "en";
      try { localStorage.setItem("flipwin_lang", lang); } catch (e) {}
      applyTexts();
      renderTracker();
      CATEGORIES.forEach(cat => {
        const chip = document.getElementById("chip-" + cat.key);
        if (chip && deck.some(c => c.catKey === cat.key && c.matched)) chip.classList.add("done");
      });
    }

    function applyTexts() {
      const t = UI[lang];
      document.getElementById("pageSub").textContent = t.sub;
      document.getElementById("movesLabel").textContent = t.moves;
      document.getElementById("foundLabel").textContent = t.found;
      document.getElementById("backBtn").textContent = t.back;
      document.getElementById("langBtn").textContent = lang === "en" ? "🌐 தமிழ்" : "🌐 English";
      document.getElementById("resetBtn").textContent = t.restart;
    }

    music.play().catch(() => {});
    loadData();
  </script>

<script>
  function goNav(url){
    var ov = document.getElementById('ptOverlay');
    if(!ov){ window.location.href = url; return; }
    ov.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 620);
  }
</script>
</body>

</html>
