<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Journey ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --rose:#ff2d78;--coral:#ff6b6b;--peach:#ffb347;--gold:#ffd700;
      --magenta:#e91e8c;--lavender:#c77dff;
      --script:'Dancing Script',cursive;--body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100dvh; overflow-x:hidden; overflow-y:auto;
      font-family:var(--body); color:white; padding-bottom:60px;
      background: radial-gradient(ellipse at 20% 0%,  #ff2d78 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 50%,  #7209b7 0%, transparent 50%),
                  radial-gradient(ellipse at 10% 100%, #ffb347 0%, transparent 45%),
                  linear-gradient(170deg,#200015 0%,#2d0040 50%,#0a0a20 100%);
    }

    .back-btn{
      position:fixed;top:16px;left:16px;z-index:200;
      padding:9px 18px;border:1px solid rgba(255,255,255,.3);border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;cursor:pointer;transition:.25s;
    }
    .back-btn:hover{background:rgba(255,255,255,.3);}
    .lang-btn{
      position:fixed;top:16px;right:16px;z-index:200;
      padding:9px 18px;border:1px solid rgba(255,255,255,.3);border-radius:50px;
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-family:var(--body);font-weight:700;font-size:13px;cursor:pointer;transition:.25s;
    }
    .lang-btn:hover{background:rgba(255,255,255,.3);}
    .music-btn{
      position:fixed;bottom:20px;right:20px;z-index:200;
      width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.3);
      background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
      color:white;font-size:22px;cursor:pointer;transition:.25s;
    }
    .music-btn:hover{transform:scale(1.08);}

    .page-header{
      text-align:center;padding:100px 20px 0;
      position:relative;z-index:10;
    }
    .page-title{
      font-family:var(--script);font-size:clamp(32px,9vw,52px);font-weight:700;
      background:linear-gradient(90deg,#ffd700,#ff6b6b,#c77dff,#ffd700);
      background-size:200%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite; line-height:1.2;
    }
    @keyframes shimmer{to{background-position:200% center}}
    .page-sub{font-size:15px;opacity:.8;margin-top:8px;font-weight:600;}

    .timeline{
      position:relative; max-width:860px; margin:56px auto 0;
      padding:0 20px; z-index:10;
    }

    .timeline::before{
      content:''; position:absolute;
      left:50%; top:0; bottom:0; width:3px;
      background:linear-gradient(to bottom,transparent,rgba(255,215,0,.5) 10%,rgba(255,45,120,.5) 50%,rgba(199,125,255,.5) 90%,transparent);
      transform:translateX(-50%);
      border-radius:3px;
    }

    .tl-item{
      display:flex; margin-bottom:48px; align-items:flex-start;
      position:relative;
    }
    .tl-item:nth-child(odd)  { flex-direction:row; padding-right:calc(50% + 28px); }
    .tl-item:nth-child(even) { flex-direction:row-reverse; padding-left:calc(50% + 28px); }

    .tl-dot{
      position:absolute; left:50%; top:22px;
      width:44px; height:44px; border-radius:50%;
      transform:translateX(-50%);
      display:flex;align-items:center;justify-content:center;
      font-size:20px; z-index:5;
      background:rgba(255,255,255,.15);
      border:2px solid rgba(255,255,255,.4);
      backdrop-filter:blur(10px);
      box-shadow:0 0 16px rgba(255,45,120,.4);
      transition:transform .3s;
    }
    .tl-item:hover .tl-dot{transform:translateX(-50%) scale(1.2);}

    .tl-card{
      background:rgba(255,255,255,.11);
      border:1px solid rgba(255,255,255,.25);
      backdrop-filter:blur(20px);
      border-radius:24px;
      padding:22px 20px;
      box-shadow:0 8px 32px rgba(255,45,120,.2), inset 0 1px 0 rgba(255,255,255,.25);
      width:100%;
      opacity:0; transform:translateY(24px) scale(.96);
      transition:opacity .7s ease, transform .7s ease;
    }
    .tl-card.visible{opacity:1; transform:translateY(0) scale(1);}
    .tl-card:hover{transform:scale(1.03)!important; box-shadow:0 12px 40px rgba(255,45,120,.35);}

    .tl-card h2{
      font-family:var(--script);font-size:clamp(20px,5vw,26px);font-weight:700;
      color:var(--gold);margin-bottom:10px;
    }
    .tl-card p{font-size:14px;line-height:1.75;opacity:.9;}
    .tl-item:nth-child(1) .tl-card{border-left:3px solid var(--rose);}
    .tl-item:nth-child(2) .tl-card{border-left:3px solid var(--lavender);}
    .tl-item:nth-child(3) .tl-card{border-left:3px solid var(--peach);}
    .tl-item:nth-child(4) .tl-card{border-left:3px solid var(--coral);}
    .tl-item:nth-child(5) .tl-card{border-left:3px solid var(--gold);}

    .floaty{position:fixed;pointer-events:none;z-index:1;animation:floatUp linear forwards;}
    @keyframes floatUp{
      0%{transform:translateY(0) rotate(0);opacity:0}5%{opacity:1}
      95%{opacity:.8}100%{transform:translateY(-115dvh) rotate(720deg);opacity:0}
    }

    @media(max-width:680px){
      .timeline::before{left:20px;}
      .tl-item:nth-child(odd),
      .tl-item:nth-child(even){
        flex-direction:column; padding:0 0 0 52px;
      }
      .tl-dot{left:20px; top:16px;}
      .tl-item:nth-child(odd) .tl-card,
      .tl-item:nth-child(even) .tl-card{width:100%;}
    }
  </style>
<style id="pt-style">
.pt-overlay{
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:radial-gradient(ellipse at 50% 40%, rgba(199,125,255,.28), transparent 60%),
             linear-gradient(160deg,rgba(26,0,20,.94),rgba(45,0,48,.94) 50%,rgba(26,10,34,.94));
  opacity:0; pointer-events:none; transition:opacity .25s ease;
  backdrop-filter:blur(8px);
}
.pt-overlay.show{ opacity:1; pointer-events:all; }
.pt-cake{ position:relative; width:80px; height:72px; display:flex; align-items:center; justify-content:center; }
.pt-cake-half{ position:absolute; font-size:56px; line-height:1; filter:drop-shadow(0 0 12px rgba(255,215,0,.55)); transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
.pt-cake-left{ clip-path:inset(0 50% 0 0); }
.pt-cake-right{ clip-path:inset(0 0 0 50%); }
.pt-overlay.show .pt-cake-left{ transform:translate(-9px,1px) rotate(-7deg); }
.pt-overlay.show .pt-cake-right{ transform:translate(9px,1px) rotate(7deg); }
.pt-knife{ position:absolute; font-size:26px; opacity:0; transform:rotate(38deg); }
.pt-overlay.show .pt-knife{ animation:ptKnife .6s ease forwards; }
@keyframes ptKnife{
  0%{ left:-30px; top:-30px; opacity:0; }
  15%{ opacity:1; }
  55%{ left:50%; top:46%; }
  100%{ left:120%; top:-30px; opacity:0; }
}
.pt-caption{ font-family:'Dancing Script',cursive; font-size:16px; font-weight:700; color:#ffd700; letter-spacing:.5px;
  text-shadow:0 0 10px rgba(255,45,120,.5); opacity:.95; }
</style>
</head>
<body>
  <div class="pt-overlay" id="ptOverlay">
    <div class="pt-cake">
      <div class="pt-cake-half pt-cake-left">🎂</div>
      <div class="pt-cake-half pt-cake-right">🎂</div>
      <div class="pt-knife">🔪</div>
    </div>
    <p class="pt-caption">Just a moment, love…</p>
  </div>

  <audio id="bgMusic" loop>
    <source src="/music/Theri Love Bgm.mp3" type="audio/mpeg"/>
  </audio>

  <button class="back-btn" onclick="goBack()">← Back</button>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 தமிழ்</button>
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🔊</button>

  <div class="page-header">
    <h1 class="page-title" id="mainTitle">❤️ Our Beautiful Journey ❤️</h1>
    <p class="page-sub" id="mainSub">Every memory with you is magical ✨</p>
  </div>

  <div class="timeline" id="timelineEl"></div>

  <script>
    const music=document.getElementById('bgMusic');
    music.play().catch(()=>{});

    let lang='en';

    const data=[
      {
        icon:'🎂',
        title:{en:'The Beginning',ta:'ஆரம்பம்'},
        msg:{en:'The day you came into this world, happiness entered everyone\'s life ❤️',
             ta:'நீ இந்த உலகிற்கு வந்த நாள் அனைவரின் வாழ்க்கையிலும் மகிழ்ச்சி வந்தது ❤️'}
      },
      {
        icon:'🌸',
        title:{en:'Childhood Moments',ta:'குழந்தை பருவ நினைவுகள்'},
        msg:{en:'Cute smiles, tiny steps, and innocent memories filled with endless joy 💖',
             ta:'அழகான சிரிப்புகள், சிறிய அடிகள், இனிய குழந்தை பருவ நினைவுகள் 💖'}
      },
      {
        icon:'✨',
        title:{en:'Favourite Memories',ta:'பிடித்த நினைவுகள்'},
        msg:{en:'Every laugh, every hug, every little moment became priceless 💫',
             ta:'ஒவ்வொரு சிரிப்பும், அணைப்பும், ஒவ்வொரு தருணமும் விலைமதிப்பற்றது 💫'}
      },
      {
        icon:'🏡',
        title:{en:'Family Love',ta:'குடும்ப அன்பு'},
        msg:{en:'Your care and kindness made our life so beautiful ❤️',
             ta:'உங்கள் அன்பும் அக்கறையும் வாழ்க்கையை அழகாக்கியது ❤️'}
      },
      {
        icon:'🎉',
        title:{en:'Today — Your Special Day!',ta:'இன்று — உங்கள் சிறப்பு நாள்!'},
        msg:{en:'Today is all about celebrating YOU 💕 Happy Birthday, Amma 🎂',
             ta:'இன்று முழுவதும் உங்களை கொண்டாடுவதற்கான நாள் 💕 இனிய பிறந்தநாள் வாழ்த்துகள் 🎂'}
      },
    ];

    function render(){
      const el=document.getElementById('timelineEl');
      el.innerHTML='';
      data.forEach((item,i)=>{
        const div=document.createElement('div');
        div.className='tl-item';
        div.innerHTML=`
          <div class="tl-dot">${item.icon}</div>
          <div class="tl-card">
            <h2>${item.title[lang]}</h2>
            <p>${item.msg[lang]}</p>
          </div>`;
        el.appendChild(div);
        setTimeout(()=>div.querySelector('.tl-card').classList.add('visible'), 200+i*180);
      });

      const observer=new IntersectionObserver(entries=>{
        entries.forEach(entry=>{
          if(entry.isIntersecting) entry.target.classList.add('visible');
        });
      },{threshold:.15});
      document.querySelectorAll('.tl-card').forEach(c=>observer.observe(c));

      const titles={
        en:{t:'❤️ Our Beautiful Journey ❤️',s:'Every memory with you is magical ✨'},
        ta:{t:'❤️ நமது அழகான பயணம் ❤️',  s:'உங்களுடன் உள்ள ஒவ்வொரு நினைவும் மந்திரம் ✨'}
      };
      document.getElementById('mainTitle').textContent=titles[lang].t;
      document.getElementById('mainSub').textContent=titles[lang].s;
    }
    render();

    function toggleLang(){
      lang=lang==='en'?'ta':'en';
      document.getElementById('langBtn').textContent=lang==='en'?'🌐 தமிழ்':'🌐 English';
      render();
    }
    function toggleMusic(){ music.paused?music.play():music.pause(); document.getElementById('musicBtn').textContent=music.paused?'🔇':'🔊'; }
    function goBack(){ goNav('/surprice.html'); }
    const emojis=['🌸','💖','✨','🌺','🎀','💝','🌷','🎈'];
    function spawnFloat(){
      const e=document.createElement('div');e.className='floaty';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.cssText=`left:${Math.random()*100}vw;bottom:-20px;font-size:${14+Math.random()*18}px;
        animation-duration:${5+Math.random()*5}s;`;
      document.body.appendChild(e);setTimeout(()=>e.remove(),10000);
    }
    setInterval(spawnFloat,500);
  </script>
<script>
  function goNav(url){
    var ov = document.getElementById('ptOverlay');
    if(!ov){ window.location.href = url; return; }
    ov.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 620);
  }
</script>
</body>
</html>
